<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio Obligatorio de Contraseña | SIGECLIN</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --accent-blue: #0ea5e9;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        .btn-custom {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
            color: white;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">Establecer Nueva Contraseña</h3>
        <p class="text-muted small">Por normativas de seguridad clínica, debe configurar su propia contraseña antes de continuar.</p>
    </div>
    
    <form id="formCambiarClave">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" id="csrfToken"/>
        
        <div class="mb-3">
            <label class="form-label fw-medium text-dark small">Nueva Contraseña</label>
            <input type="password" class="form-control form-control-lg" id="newPassword" name="newPassword" placeholder="De 8 a 12 caracteres alfanuméricos" required style="font-size: 0.95rem; border-radius: 12px;">
            <div class="form-text text-muted" style="font-size: 0.75rem; line-height: 1.2;"> Debe incluir mayúscula, minúscula, número y algún carácter especial como: $ % & ¡ ! ? * @ # - _ . +</div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-medium text-dark small">Confirmar Contraseña</label>
            <input type="password" class="form-control form-control-lg" id="confirmPassword" name="confirmPassword" placeholder="Repita la nueva contraseña" required style="font-size: 0.95rem; border-radius: 12px;">
        </div>

        <button type="submit" class="btn btn-custom" id="btnGuardar">Guardar y Continuar</button>
    </form>
</div>

<script>
    document.getElementById('formCambiarClave').addEventListener('submit', async function(e) {
        e.preventDefault();
        const pwd = document.getElementById('newPassword').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        const csrfInput = document.getElementById('csrfToken');
        
        if (pwd !== confirmPwd) {
            Swal.fire({
                icon: 'warning',
                title: 'Contraseñas no coinciden',
                text: 'Por favor, asegúrese de que ambas contraseñas ingresadas sean exactamente iguales.',
                confirmButtonColor: '#0ea5e9'
            });
            return;
        }

        if (pwd.length < 8 || pwd.length > 12) {
            Swal.fire({
                icon: 'warning',
                title: 'Longitud inválida',
                text: 'La contraseña debe tener una longitud de entre 8 y 12 caracteres.',
                confirmButtonColor: '#0ea5e9'
            });
            return;
        }

        const formData = new URLSearchParams();
        formData.append('newPassword', pwd);
        formData.append('confirmPassword', confirmPwd);
        if (csrfInput) {
            formData.append(csrfInput.name, csrfInput.value);
        }

        try {
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            const response = await fetch('/cambiar-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            });

            const data = await response.json();

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: '¡Contraseña Cambiada!',
                    text: data.message,
                    timer: 2500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = '/login';
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error de Validación',
                    text: data.message || 'Error al actualizar la contraseña',
                    confirmButtonColor: '#dc3545'
                });
                btn.disabled = false;
                btn.innerText = "Guardar y Continuar";
            }
        } catch (err) {
            Swal.fire({
                icon: 'error',
                title: 'Error de Red',
                text: 'No se pudo conectar con el servidor. Intente nuevamente.',
                confirmButtonColor: '#dc3545'
            });
            document.getElementById('btnGuardar').disabled = false;
            document.getElementById('btnGuardar').innerText = "Guardar y Continuar";
        }
    });
</script>

</body>
</html>
