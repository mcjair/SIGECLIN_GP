<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGECLIN - Acceso al Sistema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css(v='3.2')}">
    
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 32px;
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 40px 100px -10px rgba(15, 23, 42, 0.08);
            transition: var(--transition);
        }
        
        [data-theme="dark"] body {
            background: radial-gradient(circle at 50% 50%, #064e3b 0%, #022c22 100%);
        }
        
        [data-theme="dark"] .login-card {
            background: #0b1329;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px -10px rgba(0, 0, 0, 0.5);
        }
        [data-theme="dark"] .text-dark {
            color: #f8fafc !important;
        }
        
        .login-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        
        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 15px 35px rgba(13, 148, 136, 0.35);
        }
        
        .form-floating > .form-control {
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            padding: 1.5rem 1rem;
            height: 65px;
            background: #f8fafc;
            color: #0f172a;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .form-floating > label {
            opacity: 0.55;
            font-weight: 600;
        }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            opacity: 0.75;
        }
        [data-theme="dark"] .form-floating > .form-control {
            background: #0b1329;
            border-color: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }
        
        .form-floating > .form-control:focus {
            box-shadow: 0 0 0 4px var(--primary-soft) !important;
            border-color: var(--primary) !important;
            background: #ffffff;
        }
        
        [data-theme="dark"] .form-floating > .form-control:focus {
            background: #070c19;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px var(--primary-soft) !important;
        }
        
        .decoration-blob {
            position: absolute;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.45;
            border-radius: 50%;
            animation: float-blob 20s infinite alternate ease-in-out;
        }
        
        @keyframes float-blob {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(40px, -60px) scale(1.15);
            }
            100% {
                transform: translate(-30px, 40px) scale(0.9);
            }
        }
        
        @keyframes float-blob-reverse {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-50px, 50px) scale(0.9);
            }
            100% {
                transform: translate(40px, -40px) scale(1.1);
            }
        }

        /* SVG Heartbeat Loader CSS */
        .loading svg polyline {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .loading svg polyline#back {
            fill: none;
            stroke: var(--primary-soft) !important;
        }

        .loading svg polyline#front {
            fill: none;
            stroke: var(--primary) !important;
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash_682 2s linear infinite;
            animation-delay: 0s;
        }

        .loading svg polyline#front2 {
            fill: none;
            stroke: var(--primary) !important;
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash_682 2s linear infinite;
            animation-delay: 1s;
        }

        @keyframes dash_682 {
            72.5% {
                opacity: 0;
            }
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>
    <div class="decoration-blob bg-primary" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="decoration-blob bg-info" style="width: 300px; height: 300px; bottom: -50px; right: -50px; animation-name: float-blob-reverse;"></div>

    <div class="login-card animate-fade-in">
        <div class="login-header">
            <div class="logo-circle">
                <i class="bi bi-shield-plus text-white fs-1"></i>
            </div>
            <h2 class="fw-800 text-dark mb-1 brand-title-gold">SIGECLIN</h2>
            <p class="text-muted small">Sistema Integrado de Gestión Clínica</p>
        </div>

        <div th:if="${param.error}" class="alert bg-danger-subtle border-0 rounded-4 p-3 mb-4 text-center">
            <i class="bi bi-exclamation-circle me-2"></i> Credenciales incorrectas
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Usuario" required autocomplete="off">
                <label for="username" class="text-muted fw-bold">Usuario</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                <label for="password" class="text-muted fw-bold">Contraseña</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember-me">
                    <label class="form-check-label small fw-bold text-muted" for="remember">Recordarme</label>
                </div>
                <a href="#" class="small fw-800 text-decoration-none" style="color: #0d9488;">¿Olvidó su clave?</a>
            </div>

            <button type="submit" class="btn w-100 text-uppercase fw-900 text-white" style="background: linear-gradient(135deg, #0d9488, #0f766e); height: 50px; border-radius: 12px; box-shadow: 0 8px 20px rgba(13, 148, 136, 0.3);">
                <span class="label">Ingresar al Sistema <i class="bi bi-arrow-right ms-2"></i></span>
            </button>
        </form>

        <div class="mt-5 text-center">
            <p class="extra-small text-dim fw-bold">© 2026 SIGECLIN by Mc</p>
        </div>
    </div>

    <!-- Loader Overlay -->
    <div id="loaderOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-none flex-column justify-content-center align-items-center" style="background: var(--bg-card); z-index: 9999;">
        <div class="loading">
            <svg height="80px" width="100px" viewBox="0 0 64 48">
                <polyline id="back" points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" />
                <polyline id="front" points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" />
                <polyline id="front2" points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" />
            </svg>
        </div>
        <h5 class="mt-4 fw-800 text-dark">Autenticando credenciales...</h5>
        <p class="text-muted small fw-bold">Por favor espere un momento</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            const overlay = document.getElementById('loaderOverlay');
            overlay.classList.remove('d-none');
            overlay.classList.add('d-flex');
            
            setTimeout(() => {
                form.submit();
            }, 2000);
        });
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>

    <!-- Password Recovery Modal -->
    <div class="modal fade" id="modalRecuperarClave" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-premium" style="border-radius: 24px;">
                <div class="modal-header bg-primary-soft border-0" style="border-radius: 24px 24px 0 0;">
                    <h5 class="modal-title fw-800 text-primary"><i class="bi bi-key me-2"></i>Recuperar Contraseña</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted small fw-bold mb-3">Ingrese su usuario y número de documento para restablecer su contraseña.</p>
                    <div class="mb-3">
                        <label class="form-label fw-800 small text-muted">USUARIO</label>
                        <input type="text" class="form-control-premium form-control" id="recUser" placeholder="Ej: admin" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-800 small text-muted">N° DOCUMENTO (DNI)</label>
                        <input type="text" class="form-control-premium form-control" id="recDni" placeholder="Ej: 45678901" autocomplete="off">
                    </div>
                    <div id="recResult" class="mt-3"></div>
                </div>
                <div class="modal-footer border-0 pt-0 px-4 pb-4">
                    <button type="button" class="btn btn-secondary rounded-pill px-4 fw-800" data-bs-dismiss="modal">CANCELAR</button>
                    <button type="button" class="btn rounded-pill px-4 fw-800 shadow-sm text-white" id="btnRecuperar" onclick="recuperarClave()" style="background: linear-gradient(135deg, #0d9488, #0f766e);">
                        <i class="bi bi-check-lg me-1"></i> RESTABLECER
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var recModal = document.getElementById('modalRecuperarClave');
        document.querySelector('a[href="#"]').addEventListener('click', function(e) {
            e.preventDefault();
            if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                new bootstrap.Modal(recModal).show();
            } else {
                alert('Cargando componente... intente de nuevo');
            }
        });

        function recuperarClave() {
            var user = document.getElementById('recUser').value.trim();
            var dni = document.getElementById('recDni').value.trim();
            var result = document.getElementById('recResult');
            var btn = document.getElementById('btnRecuperar');

            if (!user || !dni) { result.innerHTML = '<div class="alert alert-danger py-2 small fw-800">Complete todos los campos</div>'; return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> PROCESANDO...';

            fetch('/api/auth/recuperar-clave', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, documento: dni})
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.error) {
                    result.innerHTML = '<div class="alert alert-danger py-2 small fw-800">' + res.error + '</div>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> RESTABLECER';
                    return;
                }
                result.innerHTML = '<div class="alert alert-success py-3 small fw-800 text-center">' +
                    '✔ Contraseña restablecida exitosamente<br>' +
                    '<span class="d-block mt-2">Usuario: <strong>' + res.usuario + '</strong></span>' +
                    '<span class="d-block">Nueva clave: <strong>' + res.nuevaClave + '</strong></span>' +
                    '<span class="d-block mt-2 text-muted">(Se solicitará cambio de clave al iniciar sesión)</span></div>';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> RESTABLECER';
            })
            .catch(function(e) {
                result.innerHTML = '<div class="alert alert-danger py-2 small fw-800">Error de conexión: ' + e.message + '</div>';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> RESTABLECER';
            });
        }
    </script>
</body>
</html>
