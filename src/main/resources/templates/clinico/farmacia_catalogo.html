<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Catálogo de Medicamentos')}"></head>
<body class="bg-deep overflow-hidden">
    <div th:replace="~{layout :: sidebar}"></div>

    <main th:replace="~{layout :: main(pageTitle='Catálogo de Medicamentos', content=~{::#catalogo-content})}">
        <div id="catalogo-content" class="h-100 d-flex flex-column p-4" style="max-height: 100vh; margin-top: -15px;">
            
            <!-- HEADER EXTENSION (Below Layout Title) -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <p class="text-muted small mb-0">Gestiona el vademécum de fármacos disponibles para las recetas</p>
                <button class="btn btn-sm text-white rounded-pill px-4 py-2 fw-800 shadow-sm" style="background-color: #0d9488;" onclick="abrirModalNuevo()">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo Medicamento
                </button>
            </div>

            <!-- FILTERS -->
            <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                <div class="position-relative" style="width: 300px;">
                    <i class="bi bi-search position-absolute text-muted" style="left: 15px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="text" id="searchInput" class="form-control rounded-pill ps-5 border-0 shadow-sm" placeholder="Buscar por nombre o tipo..." onkeyup="filtrarTabla()">
                </div>
                
                <div class="d-flex gap-2 flex-wrap" id="filterPills">
                    <span class="badge rounded-pill px-3 py-2 fw-800 cursor-pointer filter-pill active" onclick="aplicarFiltro('Todos', this)">Todos</span>
                    <span class="badge rounded-pill px-3 py-2 fw-800 cursor-pointer filter-pill" onclick="aplicarFiltro('Antibiótico', this)">Antibiótico</span>
                    <span class="badge rounded-pill px-3 py-2 fw-800 cursor-pointer filter-pill" onclick="aplicarFiltro('Analgésico', this)">Analgésico</span>
                    <span class="badge rounded-pill px-3 py-2 fw-800 cursor-pointer filter-pill" onclick="aplicarFiltro('Corticoesteroide', this)">Corticoesteroide</span>
                    <span class="badge rounded-pill px-3 py-2 fw-800 cursor-pointer filter-pill" onclick="aplicarFiltro('Antiinflamatorio', this)">Antiinflamatorio</span>
                </div>
            </div>

            <!-- KPI CARDS -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; background-color: #eff6ff; color: #3b82f6;">
                            <i class="bi bi-box fs-5"></i>
                        </div>
                        <div>
                            <h4 class="fw-800 mb-0">10</h4>
                            <span class="text-muted extra-small fw-bold">Total Registrados</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; background-color: #f0fdf4; color: #22c55e;">
                            <i class="bi bi-check-lg fs-5"></i>
                        </div>
                        <div>
                            <h4 class="fw-800 mb-0">10</h4>
                            <span class="text-muted extra-small fw-bold">Activos</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; background-color: #fefce8; color: #eab308;">
                            <i class="bi bi-x-lg fs-5"></i>
                        </div>
                        <div>
                            <h4 class="fw-800 mb-0">0</h4>
                            <span class="text-muted extra-small fw-bold">Inactivos</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; background-color: #f5f3ff; color: #8b5cf6;">
                            <i class="bi bi-capsule fs-5"></i>
                        </div>
                        <div>
                            <h4 class="fw-800 mb-0">5</h4>
                            <span class="text-muted extra-small fw-bold">Categorías</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DATA TABLE -->
            <div class="card border-0 shadow-sm rounded-4 flex-grow-1 overflow-hidden d-flex flex-column">
                <div class="table-responsive flex-grow-1 custom-scrollbar">
                    <table class="table table-hover align-middle mb-0 border-0">
                        <thead>
                            <tr>
                                <th class="ps-4 py-3 fw-800 text-muted extra-small text-uppercase border-0 tracking-wider">Medicamento</th>
                                <th class="py-3 fw-800 text-muted extra-small text-uppercase border-0 tracking-wider">Tipo / Categoría</th>
                                <th class="py-3 fw-800 text-muted extra-small text-uppercase border-0 tracking-wider">Dosis Sugerida</th>
                                <th class="py-3 fw-800 text-muted extra-small text-uppercase border-0 tracking-wider">Frecuencia Sugerida</th>
                                <th class="py-3 fw-800 text-muted extra-small text-uppercase border-0 tracking-wider text-center">Estado</th>
                                <th class="pe-4 py-3 fw-800 text-muted extra-small text-uppercase border-0 tracking-wider text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="border-top-0" id="tablaMedicamentos">
                            <tr><td colspan="6" class="text-center py-4 text-muted">Cargando medicamentos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <script>
                document.addEventListener('DOMContentLoaded', cargarMedicamentos);

                function categorizar(nombre) {
                    const n = nombre.toLowerCase();
                    if(n.includes('amoxi') || n.includes('clinda') || n.includes('azitro')) return 'Antibiótico';
                    if(n.includes('dexa') || n.includes('predni')) return 'Corticoesteroide';
                    if(n.includes('ibuprofeno') || n.includes('naproxeno') || n.includes('nimesulida') || n.includes('diclofenaco') || n.includes('ketoprofeno')) return 'Antiinflamatorio';
                    return 'Analgésico';
                }
                
                function dosis(cat) {
                    return '1 tableta';
                }
                
                function freq(cat) {
                    if(cat === 'Antibiótico') return 'Cada 8 horas por 7 días';
                    if(cat === 'Corticoesteroide') return 'Cada 24 horas por 3 días';
                    if(cat === 'Antiinflamatorio') return 'Cada 12 horas por 3 días';
                    return 'Cada 8 horas en caso de dolor';
                }

                function cargarMedicamentos() {
                    fetch('/api/medicamentos')
                        .then(r => r.json())
                        .then(data => {
                            const tbody = document.getElementById('tablaMedicamentos');
                            if(!data.length) {
                                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No hay medicamentos registrados</td></tr>';
                                return;
                            }
                            let html = '';
                            let activos = 0;
                            data.forEach(m => {
                                const cat = categorizar(m.nombreGenerico);
                                if(m.activo) activos++;
                                html += `<tr class="med-row" data-cat="${cat}">
                                    <td class="ps-4 py-3"><div class="fw-800 text-dark"><i class="bi bi-capsule-pill text-info me-2"></i>${m.nombreGenerico} ${m.concentracion || ''}</div></td>
                                    <td><span class="badge bg-primary-soft text-primary fw-800 rounded-pill px-3">${cat}</span></td>
                                    <td class="text-muted small fw-bold">${dosis(cat)}</td>
                                    <td class="text-muted small fw-bold">${freq(cat)}</td>
                                    <td class="text-center"><span class="badge ${m.activo ? 'bg-success-soft text-success' : 'bg-warning-soft text-warning'} fw-800 rounded-pill px-3">${m.activo ? 'Activo' : 'Inactivo'}</span></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-sm btn-light text-muted rounded-circle me-1" onclick="editarMed(${m.idMedicamento}, '${m.nombreGenerico}', '${m.concentracion||''}', '${m.presentacion||''}')"><i class="bi bi-pencil"></i></button>
                                        <button class="btn btn-sm btn-light text-muted rounded-circle" onclick="eliminarMed(${m.idMedicamento})"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>`;
                            });
                            tbody.innerHTML = html;
                            
                            // Update KPIs
                            document.querySelector('.col-md-3:nth-child(1) h4').innerText = data.length;
                            document.querySelector('.col-md-3:nth-child(2) h4').innerText = activos;
                            document.querySelector('.col-md-3:nth-child(3) h4').innerText = data.length - activos;
                        })
                        .catch(e => console.error(e));
                }

                function aplicarFiltro(cat, btnElement) {
                    // Update UI pills
                    document.querySelectorAll('.filter-pill').forEach(b => {
                        b.classList.remove('active');
                    });
                    btnElement.classList.add('active');

                    // Filter rows
                    const rows = document.querySelectorAll('.med-row');
                    rows.forEach(r => {
                        if(cat === 'Todos' || r.dataset.cat === cat) {
                            r.style.display = '';
                        } else {
                            r.style.display = 'none';
                        }
                    });
                }

                function filtrarTabla() {
                    const q = document.getElementById('searchInput').value.toLowerCase();
                    const rows = document.querySelectorAll('.med-row');
                    const activePill = document.querySelector('.filter-pill.active').innerText.replace(/\s\(\d+\)/, '');
                    
                    rows.forEach(r => {
                        const text = r.innerText.toLowerCase();
                        const matchQ = text.includes(q);
                        const matchCat = activePill === 'Todos' || r.dataset.cat === activePill;
                        if(matchQ && matchCat) r.style.display = '';
                        else r.style.display = 'none';
                    });
                }

                function abrirModalNuevo() {
                    Swal.fire({
                        title: '<div class="text-start fs-5 text-primary fw-800"><i class="bi bi-paperclip me-2"></i>Nuevo Medicamento</div>',
                        html: `
                            <div class="text-start mt-3">
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Nombre del Medicamento *</label>
                                    <input id="swal-nombre" class="form-control" style="border-radius:10px;" placeholder="Ej: Amoxicilina 500mg">
                                </div>
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Tipo / Categoría</label>
                                    <select id="swal-tipo" class="form-select" style="border-radius:10px;">
                                        <option value="">Seleccionar tipo...</option>
                                        <option>Antibiótico</option>
                                        <option>Analgésico</option>
                                        <option>Antiinflamatorio</option>
                                        <option>Corticoesteroide</option>
                                        <option>Anestésico</option>
                                        <option>Anticoagulante</option>
                                        <option>Antihistamínico</option>
                                        <option>Vitamina / Suplemento</option>
                                        <option>Otro</option>
                                    </select>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Dosis Sugerida</label>
                                        <input id="swal-dosis" class="form-control" style="border-radius:10px;" placeholder="Ej: 1 tableta">
                                    </div>
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Frecuencia Sugerida</label>
                                        <input id="swal-freq" class="form-control" style="border-radius:10px;" placeholder="Ej: Cada 8 horas por 7 días">
                                    </div>
                                </div>
                            </div>
                        `,
                        showCloseButton: true,
                        showCancelButton: true,
                        confirmButtonText: 'Registrar Medicamento',
                        cancelButtonText: 'Cancelar',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'btn btn-primary px-4 py-2 ms-2 fw-bold rounded-3 shadow-sm',
                            cancelButton: 'btn btn-white border px-4 py-2 fw-bold rounded-3 shadow-sm',
                            actions: 'd-flex justify-content-end w-100 mt-4',
                            popup: 'rounded-4'
                        },
                        width: '500px',
                        preConfirm: () => {
                            return {
                                nombreGenerico: document.getElementById('swal-nombre').value,
                                concentracion: '', // Mocked or parse from name
                                presentacion: document.getElementById('swal-dosis').value // Storing dosis in presentacion for now
                            }
                        }
                    }).then((result) => {
                        if(result.isConfirmed && result.value.nombreGenerico) {
                            fetch('/api/medicamentos', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(result.value)
                            }).then(() => cargarMedicamentos());
                        }
                    });
                }

                function editarMed(id, nom, conc, pres) {
                    Swal.fire({
                        title: '<div class="text-start fs-5 text-primary fw-800"><i class="bi bi-paperclip me-2"></i>Editar Medicamento</div>',
                        html: `
                            <div class="text-start mt-3">
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Nombre del Medicamento *</label>
                                    <input id="swal-nombre" class="form-control" style="border-radius:10px;" value="${nom}">
                                </div>
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Tipo / Categoría</label>
                                    <select id="swal-tipo" class="form-select" style="border-radius:10px;">
                                        <option value="">Seleccionar tipo...</option>
                                        <option selected>Antibiótico</option>
                                        <option>Analgésico</option>
                                        <option>Antiinflamatorio</option>
                                        <option>Corticoesteroide</option>
                                        <option>Anestésico</option>
                                        <option>Anticoagulante</option>
                                        <option>Antihistamínico</option>
                                        <option>Vitamina / Suplemento</option>
                                        <option>Otro</option>
                                    </select>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Dosis Sugerida</label>
                                        <input id="swal-dosis" class="form-control" style="border-radius:10px;" value="${pres}">
                                    </div>
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Frecuencia Sugerida</label>
                                        <input id="swal-freq" class="form-control" style="border-radius:10px;" value="Cada 8 horas por 7 días">
                                    </div>
                                </div>
                            </div>
                        `,
                        showCloseButton: true,
                        showCancelButton: true,
                        confirmButtonText: 'Guardar Cambios',
                        cancelButtonText: 'Cancelar',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'btn btn-primary px-4 py-2 ms-2 fw-bold rounded-3 shadow-sm',
                            cancelButton: 'btn btn-white border px-4 py-2 fw-bold rounded-3 shadow-sm',
                            actions: 'd-flex justify-content-end w-100 mt-4',
                            popup: 'rounded-4'
                        },
                        width: '500px',
                        preConfirm: () => {
                            return {
                                nombreGenerico: document.getElementById('swal-nombre').value,
                                concentracion: '',
                                presentacion: document.getElementById('swal-dosis').value
                            }
                        }
                    }).then((result) => {
                        if(result.isConfirmed) {
                            fetch('/api/medicamentos/' + id, {
                                method: 'PUT',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(result.value)
                            }).then(() => cargarMedicamentos());
                        }
                    });
                }

                function eliminarMed(id) {
                    Swal.fire({
                        title: '¿Eliminar medicamento?',
                        text: "Esta acción no se puede deshacer.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ef4444',
                        confirmButtonText: 'Sí, eliminar'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            fetch('/api/medicamentos/' + id, {
                                method: 'DELETE'
                            }).then(() => cargarMedicamentos());
                        }
                    });
                }
            </script>
            
            <style>
                .badge { font-weight: 800 !important; }
                .tracking-wider { letter-spacing: 0.05em; }
                .cursor-pointer { cursor: pointer; }
                .bg-primary-soft { background-color: var(--primary-soft) !important; color: var(--primary) !important; }
                .bg-success-soft { background-color: rgba(34, 197, 94, 0.1) !important; color: #15803d !important; }
                
                table tr { transition: all 0.2s ease; }
                table tbody tr:hover { background-color: var(--primary-soft) !important; }
                table td { border-bottom: 1px solid var(--border); vertical-align: middle; }
            </style>
        </div>
    </main>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
