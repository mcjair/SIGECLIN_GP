<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Catálogo de Medicamentos')}"></head>
<body class="bg-deep overflow-hidden">
    <div th:replace="~{layout :: sidebar}"></div>

    <main th:replace="~{layout :: main(pageTitle='Catálogo de Medicamentos', content=~{::#catalogo-content})}">
        <div id="catalogo-content" class="h-100 d-flex flex-column p-4" style="max-height: 100vh; margin-top: -15px;">
            
            <!-- HEADER EXTENSION (Below Layout Title) -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <p class="text-muted small mb-0 fw-medium">Gestiona el vademécum de fármacos disponibles para las recetas</p>
                <button class="btn btn-premium-primary text-white rounded-pill px-4 py-2 fw-bold shadow-sm d-flex align-items-center gap-2" onclick="abrirModalNuevo()">
                    <i class="bi bi-plus-circle-fill"></i> Nuevo Medicamento
                </button>
            </div>

            <!-- FILTERS -->
            <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                <div class="position-relative" style="width: 300px;">
                    <i class="bi bi-search position-absolute text-muted" style="left: 15px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="text" id="searchInput" class="form-control rounded-pill ps-5 border-0 shadow-sm" placeholder="Buscar por nombre o tipo..." onkeyup="filtrarTabla()">
                </div>
                
                <div class="d-flex gap-2 flex-wrap" id="filterPills">
                    <button class="btn-filter active" onclick="aplicarFiltro('Todos', this)">Todos</button>
                    <button class="btn-filter" onclick="aplicarFiltro('Antibiótico', this)">Antibiótico</button>
                    <button class="btn-filter" onclick="aplicarFiltro('Analgésico', this)">Analgésico</button>
                    <button class="btn-filter" onclick="aplicarFiltro('Corticoesteroide', this)">Corticoesteroide</button>
                    <button class="btn-filter" onclick="aplicarFiltro('Antiinflamatorio', this)">Antiinflamatorio</button>
                </div>
            </div>

            <!-- KPI CARDS -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="kpi-card h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="kpi-icon-box bg-blue-soft text-blue">
                            <i class="bi bi-box-seam fs-5"></i>
                        </div>
                        <div>
                            <h3 class="fw-black mb-0 text-dark tracking-tight">10</h3>
                            <span class="text-muted extra-small fw-bold text-uppercase tracking-wider">Total Registrados</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="kpi-card h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="kpi-icon-box bg-green-soft text-green">
                            <i class="bi bi-check-circle fs-5"></i>
                        </div>
                        <div>
                            <h3 class="fw-black mb-0 text-dark tracking-tight">10</h3>
                            <span class="text-muted extra-small fw-bold text-uppercase tracking-wider">Activos</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="kpi-card h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="kpi-icon-box bg-red-soft text-red">
                            <i class="bi bi-x-circle fs-5"></i>
                        </div>
                        <div>
                            <h3 class="fw-black mb-0 text-dark tracking-tight">0</h3>
                            <span class="text-muted extra-small fw-bold text-uppercase tracking-wider">Inactivos</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="kpi-card h-100 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="kpi-icon-box bg-purple-soft text-purple">
                            <i class="bi bi-grid fs-5"></i>
                        </div>
                        <div>
                            <h3 class="fw-black mb-0 text-dark tracking-tight">5</h3>
                            <span class="text-muted extra-small fw-bold text-uppercase tracking-wider">Categorías</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DATA TABLE -->
            <div class="premium-table-wrapper flex-grow-1 overflow-hidden d-flex flex-column">
                <div class="table-responsive flex-grow-1 custom-scrollbar overflow-y-auto">
                    <table class="table align-middle mb-0 premium-table">
                        <thead>
                            <tr>
                                <th class="ps-4 py-3 fw-bold text-muted extra-small text-uppercase tracking-wider">Medicamento</th>
                                <th class="py-3 fw-bold text-muted extra-small text-uppercase tracking-wider">Tipo / Categoría</th>
                                <th class="py-3 fw-bold text-muted extra-small text-uppercase tracking-wider">Dosis Sugerida</th>
                                <th class="py-3 fw-bold text-muted extra-small text-uppercase tracking-wider">Frecuencia Sugerida</th>
                                <th class="py-3 fw-bold text-muted extra-small text-uppercase tracking-wider text-center">Estado</th>
                                <th class="pe-4 py-3 fw-bold text-muted extra-small text-uppercase tracking-wider text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaMedicamentos">
                            <tr><td colspan="6" class="text-center py-5 text-muted"><div class="spinner-border text-primary spinner-border-sm me-2"></div>Cargando medicamentos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <script>
                document.addEventListener('DOMContentLoaded', cargarMedicamentos);

                function categorizar(nombre) {
                    const n = nombre.toLowerCase();
                    if(n.includes('amoxi') || n.includes('clinda') || n.includes('azitro')) return 'Antibiótico';
                    if(n.includes('dexa') || n.includes('predni')) return 'Corticoesteroide';
                    if(n.includes('ibuprofeno') || n.includes('naproxeno') || n.includes('nimesulida') || n.includes('diclofenaco') || n.includes('ketoprofeno')) return 'Antiinflamatorio';
                    return 'Analgésico';
                }
                
                function dosis(cat) {
                    return '1 tableta';
                }
                
                function freq(cat) {
                    if(cat === 'Antibiótico') return 'Cada 8 horas por 7 días';
                    if(cat === 'Corticoesteroide') return 'Cada 24 horas por 3 días';
                    if(cat === 'Antiinflamatorio') return 'Cada 12 horas por 3 días';
                    return 'Cada 8 horas en caso de dolor';
                }

                function cargarMedicamentos() {
                    fetch('/api/medicamentos')
                        .then(r => r.json())
                        .then(data => {
                            const tbody = document.getElementById('tablaMedicamentos');
                            if(!data.length) {
                                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No hay medicamentos registrados</td></tr>';
                                return;
                            }
                            let html = '';
                            let activos = 0;
                            data.forEach(m => {
                                const cat = categorizar(m.nombreGenerico);
                                if(m.activo) activos++;
                                html += `<tr class="med-row" data-cat="${cat}">
                                    <td class="ps-4 py-3"><div class="fw-bold text-dark"><i class="bi bi-capsule text-primary opacity-50 me-2"></i>${m.nombreGenerico} <span class="text-muted fw-medium">${m.concentracion || ''}</span></div></td>
                                    <td><span class="premium-badge bg-light text-dark fw-bold border"><span class="dot bg-primary me-2"></span>${cat}</span></td>
                                    <td class="text-muted small fw-medium">${dosis(cat).toUpperCase()}</td>
                                    <td class="text-muted small fw-medium">${freq(cat).toUpperCase()}</td>
                                    <td class="text-center">
                                        <div class="status-indicator ${m.activo ? 'status-active' : 'status-inactive'} mx-auto">
                                            ${m.activo ? 'Activo' : 'Inactivo'}
                                        </div>
                                    </td>
                                    <td class="pe-4 text-end">
                                        <button class="btn-action" title="Editar" onclick="editarMed(${m.idMedicamento}, '${m.nombreGenerico}', '${m.concentracion||''}', '${m.presentacion||''}')"><i class="bi bi-pencil"></i></button>
                                        <button class="btn-action action-danger ms-1" title="Eliminar" onclick="eliminarMed(${m.idMedicamento})"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>`;
                            });
                            tbody.innerHTML = html;
                            
                            // Update KPIs
                            document.querySelector('.col-md-3:nth-child(1) h4').innerText = data.length;
                            document.querySelector('.col-md-3:nth-child(2) h4').innerText = activos;
                            document.querySelector('.col-md-3:nth-child(3) h4').innerText = data.length - activos;
                        })
                        .catch(e => console.error(e));
                }

                function aplicarFiltro(cat, btnElement) {
                    // Update UI pills
                    document.querySelectorAll('.btn-filter').forEach(b => {
                        b.classList.remove('active');
                    });
                    btnElement.classList.add('active');

                    // Filter rows
                    const rows = document.querySelectorAll('.med-row');
                    rows.forEach(r => {
                        if(cat === 'Todos' || r.dataset.cat === cat) {
                            r.style.display = '';
                        } else {
                            r.style.display = 'none';
                        }
                    });
                }

                function filtrarTabla() {
                    const q = document.getElementById('searchInput').value.toLowerCase();
                    const rows = document.querySelectorAll('.med-row');
                    const activePill = document.querySelector('.btn-filter.active').innerText.replace(/\s\(\d+\)/, '');
                    
                    rows.forEach(r => {
                        const text = r.innerText.toLowerCase();
                        const matchQ = text.includes(q);
                        const matchCat = activePill === 'Todos' || r.dataset.cat === activePill;
                        if(matchQ && matchCat) r.style.display = '';
                        else r.style.display = 'none';
                    });
                }

                function abrirModalNuevo() {
                    Swal.fire({
                        title: '<div class="text-start fs-5 text-primary fw-800"><i class="bi bi-paperclip me-2"></i>Nuevo Medicamento</div>',
                        html: `
                            <div class="text-start mt-3">
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Nombre del Medicamento *</label>
                                    <input id="swal-nombre" class="form-control" style="border-radius:10px;" placeholder="Ej: Amoxicilina 500mg">
                                </div>
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Tipo / Categoría</label>
                                    <select id="swal-tipo" class="form-select" style="border-radius:10px;">
                                        <option value="">Seleccionar tipo...</option>
                                        <option>Antibiótico</option>
                                        <option>Analgésico</option>
                                        <option>Antiinflamatorio</option>
                                        <option>Corticoesteroide</option>
                                        <option>Anestésico</option>
                                        <option>Anticoagulante</option>
                                        <option>Antihistamínico</option>
                                        <option>Vitamina / Suplemento</option>
                                        <option>Otro</option>
                                    </select>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Dosis Sugerida</label>
                                        <input id="swal-dosis" class="form-control" style="border-radius:10px;" placeholder="Ej: 1 tableta">
                                    </div>
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Frecuencia Sugerida</label>
                                        <input id="swal-freq" class="form-control" style="border-radius:10px;" placeholder="Ej: Cada 8 horas por 7 días">
                                    </div>
                                </div>
                            </div>
                        `,
                        showCloseButton: true,
                        showCancelButton: true,
                        confirmButtonText: 'Registrar Medicamento',
                        cancelButtonText: 'Cancelar',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'btn btn-primary px-4 py-2 ms-2 fw-bold rounded-3 shadow-sm',
                            cancelButton: 'btn btn-white border px-4 py-2 fw-bold rounded-3 shadow-sm',
                            actions: 'd-flex justify-content-end w-100 mt-4',
                            popup: 'rounded-4'
                        },
                        width: '500px',
                        preConfirm: () => {
                            return {
                                nombreGenerico: document.getElementById('swal-nombre').value,
                                concentracion: '', // Mocked or parse from name
                                presentacion: document.getElementById('swal-dosis').value // Storing dosis in presentacion for now
                            }
                        }
                    }).then((result) => {
                        if(result.isConfirmed && result.value.nombreGenerico) {
                            fetch('/api/medicamentos', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(result.value)
                            }).then(() => cargarMedicamentos());
                        }
                    });
                }

                function editarMed(id, nom, conc, pres) {
                    Swal.fire({
                        title: '<div class="text-start fs-5 text-primary fw-800"><i class="bi bi-paperclip me-2"></i>Editar Medicamento</div>',
                        html: `
                            <div class="text-start mt-3">
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Nombre del Medicamento *</label>
                                    <input id="swal-nombre" class="form-control" style="border-radius:10px;" value="${nom}">
                                </div>
                                <div class="mb-3">
                                    <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Tipo / Categoría</label>
                                    <select id="swal-tipo" class="form-select" style="border-radius:10px;">
                                        <option value="">Seleccionar tipo...</option>
                                        <option selected>Antibiótico</option>
                                        <option>Analgésico</option>
                                        <option>Antiinflamatorio</option>
                                        <option>Corticoesteroide</option>
                                        <option>Anestésico</option>
                                        <option>Anticoagulante</option>
                                        <option>Antihistamínico</option>
                                        <option>Vitamina / Suplemento</option>
                                        <option>Otro</option>
                                    </select>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Dosis Sugerida</label>
                                        <input id="swal-dosis" class="form-control" style="border-radius:10px;" value="${pres}">
                                    </div>
                                    <div class="col-6">
                                        <label class="fw-800 small text-muted mb-1 text-uppercase tracking-wider">Frecuencia Sugerida</label>
                                        <input id="swal-freq" class="form-control" style="border-radius:10px;" value="Cada 8 horas por 7 días">
                                    </div>
                                </div>
                            </div>
                        `,
                        showCloseButton: true,
                        showCancelButton: true,
                        confirmButtonText: 'Guardar Cambios',
                        cancelButtonText: 'Cancelar',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'btn btn-primary px-4 py-2 ms-2 fw-bold rounded-3 shadow-sm',
                            cancelButton: 'btn btn-white border px-4 py-2 fw-bold rounded-3 shadow-sm',
                            actions: 'd-flex justify-content-end w-100 mt-4',
                            popup: 'rounded-4'
                        },
                        width: '500px',
                        preConfirm: () => {
                            return {
                                nombreGenerico: document.getElementById('swal-nombre').value,
                                concentracion: '',
                                presentacion: document.getElementById('swal-dosis').value
                            }
                        }
                    }).then((result) => {
                        if(result.isConfirmed) {
                            fetch('/api/medicamentos/' + id, {
                                method: 'PUT',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(result.value)
                            }).then(() => cargarMedicamentos());
                        }
                    });
                }

                function eliminarMed(id) {
                    Swal.fire({
                        title: '¿Eliminar medicamento?',
                        text: "Esta acción no se puede deshacer.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ef4444',
                        confirmButtonText: 'Sí, eliminar'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            fetch('/api/medicamentos/' + id, {
                                method: 'DELETE'
                            }).then(() => cargarMedicamentos());
                        }
                    });
                }
            </script>
            
            <style>
                :root {
                    --premium-teal: #0d9488;
                    --premium-teal-hover: #0f766e;
                }
                .fw-black { font-weight: 900; }
                .tracking-tight { letter-spacing: -0.05em; }
                .tracking-wider { letter-spacing: 0.05em; }
                
                /* KPI Cards Premium */
                .kpi-card {
                    background: #ffffff;
                    border-radius: 16px;
                    border: 1px solid rgba(0,0,0,0.03);
                    box-shadow: 0 4px 20px rgba(0,0,0,0.02);
                    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                }
                .kpi-card:hover {
                    transform: translateY(-4px);
                    box-shadow: 0 12px 25px rgba(0,0,0,0.06);
                }
                .kpi-icon-box {
                    width: 48px; height: 48px;
                    border-radius: 14px;
                    display: flex; align-items: center; justify-content: center;
                }
                .bg-blue-soft { background: #eff6ff; } .text-blue { color: #3b82f6; }
                .bg-green-soft { background: #f0fdf4; } .text-green { color: #10b981; }
                .bg-red-soft { background: #fef2f2; } .text-red { color: #ef4444; }
                .bg-purple-soft { background: #f5f3ff; } .text-purple { color: #8b5cf6; }

                /* Filter Buttons */
                .btn-filter {
                    background: transparent;
                    border: 1px solid #e2e8f0;
                    color: #64748b;
                    border-radius: 20px;
                    padding: 6px 16px;
                    font-size: 0.85rem;
                    font-weight: 600;
                    transition: all 0.2s;
                }
                .btn-filter:hover { background: #f8fafc; border-color: #cbd5e1; color: #334155; }
                .btn-filter.active {
                    background: var(--premium-teal);
                    border-color: var(--premium-teal);
                    color: white;
                    box-shadow: 0 4px 10px rgba(13, 148, 136, 0.2);
                }

                /* Premium Table */
                .premium-table-wrapper {
                    background: #ffffff;
                    border-radius: 16px;
                    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
                    border: 1px solid rgba(0,0,0,0.03);
                }
                .premium-table thead th {
                    background: #f8fafc;
                    border-bottom: 2px solid #f1f5f9;
                    color: #64748b;
                }
                .premium-table tbody tr {
                    transition: all 0.2s;
                    border-bottom: 1px dashed #f1f5f9;
                }
                .premium-table tbody tr:hover {
                    background-color: #f8fafc;
                }
                .premium-table tbody tr:last-child { border-bottom: none; }

                /* Status Indicators */
                .status-indicator {
                    display: inline-flex;
                    align-items: center;
                    padding: 4px 12px;
                    border-radius: 20px;
                    font-size: 0.75rem;
                    font-weight: 700;
                    text-transform: uppercase;
                    letter-spacing: 0.05em;
                }
                .status-active { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
                .status-inactive { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

                /* Badges */
                .premium-badge {
                    display: inline-flex; align-items: center;
                    padding: 4px 12px; border-radius: 8px; font-size: 0.75rem;
                }
                .premium-badge .dot {
                    width: 6px; height: 6px; border-radius: 50%;
                }

                /* Action Buttons */
                .btn-action {
                    width: 32px; height: 32px;
                    border-radius: 8px;
                    border: 1px solid #e2e8f0;
                    background: #ffffff;
                    color: #64748b;
                    display: inline-flex; align-items: center; justify-content: center;
                    transition: all 0.2s;
                }
                .btn-action:hover {
                    background: #f8fafc; color: var(--premium-teal); border-color: #cbd5e1;
                }
                .action-danger:hover { color: #ef4444; }

                /* Primary Button */
                .btn-premium-primary {
                    background: linear-gradient(135deg, var(--premium-teal), #0f766e);
                    border: none;
                    transition: all 0.3s;
                }
                .btn-premium-primary:hover {
                    transform: translateY(-1px);
                    box-shadow: 0 6px 15px rgba(13, 148, 136, 0.3) !important;
                }
            </style>
        </div>
    </main>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
