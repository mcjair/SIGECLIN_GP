<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Pacientes')}"></head>
<body class="bg-deep">
    <div th:replace="~{layout :: sidebar}"></div>
    
    <main th:replace="~{layout :: main(pageTitle='Gestión de Pacientes', content=~{::#pacientes-content}, modals=null)}">
        <div id="pacientes-content" class="h-100 d-flex gap-4 p-4" style="max-height: 100vh; margin-top: -15px;">
            
            <!-- LEFT COLUMN: Patient Search and List -->
            <div class="card glass-panel-premium border-0 shadow-sm d-flex flex-column" style="width: 380px; min-width: 380px;">
                <div class="p-4 border-bottom border-light">
                    <h6 class="fw-800 text-dark mb-3 text-uppercase small tracking-wider">Buscar Paciente</h6>
                    <form th:action="@{/pacientes/lista}" method="get" class="m-0">
                        <div class="position-relative">
                            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                            <input type="text" name="search" th:value="${search}" class="form-control rounded-pill ps-5 pe-4 border-0 shadow-sm bg-light py-2" placeholder="Escribe y presiona ENTER...">
                            <a th:if="${search != null and !search.isEmpty()}" th:href="@{/pacientes/lista}" class="position-absolute top-50 end-0 translate-middle-y me-3 text-danger" title="Limpiar"><i class="bi bi-x-circle-fill"></i></a>
                        </div>
                    </form>
                </div>
                <div class="flex-grow-1 overflow-y-auto custom-scrollbar p-3" id="patientListContainer">
                    <div th:each="p : ${pacientes}" class="patient-row kpi-card border-0 px-4 py-3 mb-3 cursor-pointer d-flex align-items-center gap-3"
                         style="min-height: 92px; position: relative; overflow: hidden;"
                         onclick="abrirHistorialFromCard(this)"
                         th:data-id="${p.idPersona}"
                         th:data-dni="${p.numeroDocumento}"
                         th:data-nombre="|${p.apellidoPaterno ?: ''} ${p.apellidoMaterno ?: ''}, ${p.nombres ?: ''}|"
                         th:data-fecha-nacimiento="${p.fechaNacimiento}"
                         th:data-telefono="${p.telefonoPrincipal}"
                         th:data-sexo="${p.sexo}">
                        
                        <!-- Vertical color accent line on active -->
                        <div class="active-indicator-bar" style="position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(to bottom, var(--primary), var(--secondary)); opacity: 0; transition: opacity 0.25s ease;"></div>

                        <!-- Dynamic Gender Avatar -->
                        <div class="avatar-circle rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 shadow-sm text-white" 
                             style="width: 44px; height: 44px; font-size: 1.25rem; border: 2px solid rgba(255,255,255,0.8); background: linear-gradient(135deg, var(--premium-teal) 0%, var(--premium-teal-hover) 100%); box-shadow: 0 4px 10px rgba(13, 148, 136, 0.3) !important; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
                            <i th:if="${p.sexo == 'F'}" class="bi bi-person-standing-dress"></i>
                            <i th:unless="${p.sexo == 'F'}" class="bi bi-person-standing"></i>
                        </div>
                        
                        <!-- Info container -->
                        <div class="flex-grow-1 min-width-0 d-flex flex-column justify-content-center">
                            <h6 class="fw-800 text-dark mb-1.5 patient-name" style="font-size: 0.82rem; line-height: 1.3; white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" th:text="|${p.apellidoPaterno ?: ''} ${p.apellidoMaterno ?: ''}, ${p.nombres ?: ''}|">Nombre</h6>
                            <div class="extra-small text-muted fw-bold d-flex align-items-center gap-1.5 patient-dni" style="font-size: 0.72rem;">
                                <i class="bi bi-card-text text-primary" style="font-size: 0.78rem; opacity: 0.75;"></i>
                                <span>DNI: <span th:text="${p.numeroDocumento}"></span></span>
                            </div>
                        </div>
                        
                        <!-- Chevron -->
                        <i class="bi bi-chevron-right text-muted small flex-shrink-0 chevron-icon" style="font-size: 0.75rem;"></i>
                    </div>
                </div>
                <!-- Pagination Controls -->
                <div class="p-3 border-top border-light d-flex justify-content-between align-items-center bg-white" style="border-bottom-left-radius: 1rem; border-bottom-right-radius: 1rem;" th:if="${totalPages > 1}">
                    <span class="text-muted fw-bold" style="font-size: 0.75rem;" th:text="'Pág ' + (${currentPage} + 1) + ' de ' + ${totalPages}"></span>
                    <ul class="pagination pagination-sm mb-0 shadow-xs">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link text-primary fw-bold" th:href="@{/pacientes/lista(page=${currentPage - 1}, search=${search})}"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link text-primary fw-bold" th:href="@{/pacientes/lista(page=${currentPage + 1}, search=${search})}"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </div>
                
            </div>

            <!-- RIGHT COLUMN: Timeline & Details -->
            <div class="flex-grow-1 d-flex flex-column overflow-hidden" id="patientDetailContainer">
                
                <div class="w-100 h-100 d-flex flex-column align-items-center justify-content-center text-center opacity-25" id="placeholderDetail">
                    <!-- Placeholder vacio a pedido -->
                </div>
                
                <div id="activePatientView" class="h-100 d-none flex-column">
                    <!-- HEADER INFO -->
                    <div class="kpi-card p-4 mb-4 flex-shrink-0 border-0">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                            <div class="d-flex gap-3 align-items-center flex-wrap">
                                <!-- Premium Header Avatar (Dynamic based on Gender via JS) -->
                                <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 text-white" 
                                     style="width: 70px; height: 70px; font-size: 2.2rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 4px solid rgba(255,255,255,0.7);" 
                                     id="detInitials">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                                <div>
                                    <div class="d-flex align-items-center gap-3 mb-2.5 flex-wrap">
                                        <h4 class="fw-900 text-dark mb-0" id="detName" style="letter-spacing: -0.025em;">Nombre Paciente</h4>
                                        <span class="badge bg-primary-soft text-primary rounded-pill fw-800 px-3 py-1.5" style="font-size: 0.75rem;">Particular</span>
                                    </div>
                                    <div class="d-flex flex-wrap gap-2.5">
                                        <div class="d-flex align-items-center gap-2 px-3 py-1.5 rounded-pill bg-light border border-light-subtle shadow-xs" style="font-size: 0.8rem;">
                                            <i class="bi bi-card-text text-primary" style="opacity: 0.85;"></i> 
                                            <span class="text-muted fw-bold">DNI:</span>
                                            <span id="detDni" class="fw-800 text-dark">---</span>
                                        </div>
                                        <div class="d-flex align-items-center gap-2 px-3 py-1.5 rounded-pill bg-light border border-light-subtle shadow-xs" style="font-size: 0.8rem;">
                                            <i class="bi bi-calendar-event text-primary" style="opacity: 0.85;"></i> 
                                            <span class="text-muted fw-bold">Edad:</span>
                                            <span id="detEdad" class="fw-800 text-dark">---</span>
                                        </div>
                                        <div class="d-flex align-items-center gap-2 px-3 py-1.5 rounded-pill bg-light border border-light-subtle shadow-xs" style="font-size: 0.8rem;">
                                            <i class="bi bi-telephone text-primary" style="opacity: 0.85;"></i> 
                                            <span class="text-muted fw-bold">Celular:</span>
                                            <span id="detCelular" class="fw-800 text-dark">---</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Alergias -->
                            <div class="bg-danger bg-opacity-10 text-danger p-3 rounded-4 d-none flex-shrink-0" style="max-width: 320px;" id="detAlergias">
                                <div class="extra-small fw-900 text-uppercase mb-1 tracking-wider"><i class="bi bi-activity me-1"></i> Alergias / Alertas Clínicas</div>
                                <div class="small fw-bold" id="detAlergiasText"></div>
                            </div>
                        </div>
                    </div>

                    <!-- TIMELINE BOX -->
                    <div class="premium-table-wrapper p-4 flex-grow-1 d-flex flex-column overflow-hidden border-0">
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-shrink-0">
                            <h5 class="fw-800 text-dark mb-0">Timeline de Evolución Clínica</h5>
                        </div>
                        <div class="timeline-container flex-grow-1 overflow-y-auto custom-scrollbar pe-2" id="timelineList">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>
            </div>

            <script>
                function abrirHistorialFromCard(element) {
                    const idPersona = element.getAttribute('data-id');
                    const nombre = element.getAttribute('data-nombre');
                    const dni = element.getAttribute('data-dni');
                    const fechaNacimiento = element.getAttribute('data-fecha-nacimiento');
                    const telefono = element.getAttribute('data-telefono') || 'No registrado';
                    const sexo = element.getAttribute('data-sexo');
                    
                    let edadStr = '---';
                    if (fechaNacimiento && fechaNacimiento !== 'null') {
                        const birthDate = new Date(fechaNacimiento);
                        const today = new Date();
                        let age = today.getFullYear() - birthDate.getFullYear();
                        const m = today.getMonth() - birthDate.getMonth();
                        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                            age--;
                        }
                        edadStr = age + ' años';
                    }
                    
                    abrirHistorial(element, idPersona, nombre, dni, edadStr, telefono, sexo);
                }

                document.addEventListener("DOMContentLoaded", () => {
                    const firstPatient = document.querySelector('.patient-row');
                    if (firstPatient) {
                        abrirHistorialFromCard(firstPatient);
                    }
                });

                async function abrirHistorial(element, idPersona, nombre, dni, edad, telefono, sexo) {
                    // Update active state in list
                    document.querySelectorAll('.patient-row').forEach(r => {
                        r.classList.remove('active');
                    });
                    element.classList.add('active');

                    // Switch view
                    const placeholder = document.getElementById('placeholderDetail');
                    const activeView = document.getElementById('activePatientView');
                    
                    placeholder.classList.add('d-none');
                    placeholder.classList.remove('d-flex');
                    
                    activeView.classList.remove('d-none');
                    activeView.classList.add('d-flex');

                    // Set header info
                    document.getElementById('detName').innerText = nombre;
                    
                    // Dynamic Gender Avatar logic
                    const detInitials = document.getElementById('detInitials');
                    if (sexo === 'F') {
                        detInitials.innerHTML = '<i class="bi bi-person-standing-dress"></i>';
                    } else {
                        detInitials.innerHTML = '<i class="bi bi-person-standing"></i>';
                    }
                    detInitials.style.background = 'linear-gradient(135deg, var(--premium-teal) 0%, var(--premium-teal-hover) 100%)';
                    detInitials.style.boxShadow = '0 6px 20px rgba(13, 148, 136, 0.35)';
                    
                    document.getElementById('detDni').innerText = dni;
                    document.getElementById('detEdad').innerText = edad;
                    document.getElementById('detCelular').innerText = telefono;

                    const timelineList = document.getElementById('timelineList');
                    timelineList.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

                    try {
                        const resp = await fetch('/pacientes/api/historial/' + idPersona);
                        if (!resp.ok) throw new Error('Error de conexión');
                        const historial = await resp.json();
                        
                        if (historial.length === 0) {
                            timelineList.innerHTML = `
                                <div class="text-center py-5 opacity-50">
                                    <i class="bi bi-calendar-x display-3 d-block mb-3"></i>
                                    <h5 class="fw-800">SIN EVOLUCIONES</h5>
                                    <p class="small">El paciente no registra atenciones previas.</p>
                                </div>`;
                            return;
                        }

                        let html = '<div class="position-relative ms-3 ps-4" id="timelineAccordion">';
                        historial.forEach(h => {
                            const [datePart, timePart] = h.fecha.split(' ');
                            const title = 'Atención Médica en ' + (h.servicio ? h.servicio.toUpperCase() : 'GENERAL');
                            const price = h.servicio === 'ODONTOLOGIA' ? '80.00' : h.servicio === 'MEDICINA GENERAL' ? '50.00' : '60.00';
                            
                            let dxHtml = '';
                            if (h.diagnostico) {
                                const dtoList = h.diagnostico.split(';');
                                dxHtml = dtoList.map(dx => `<div class="mb-1">${dx.trim()}</div>`).join('');
                            } else {
                                dxHtml = '<div>Evaluación inicial completa</div>';
                            }

                            let processHtml = '';
                            let buttonsHtml = '';
                            if (h.medicamentos && h.medicamentos.length > 0) {
                                processHtml += `
                                <div class="col-md-6">
                                    <div class="d-flex align-items-center gap-3 p-3 rounded-4 border shadow-xs doc-block-receta">
                                        <div class="d-flex align-items-center justify-content-center rounded-3 text-primary" style="width: 38px; height: 38px; flex-shrink: 0; background: #eff6ff;">
                                            <i class="bi bi-capsule" style="font-size: 1.25rem;"></i>
                                        </div>
                                        <div class="overflow-hidden">
                                            <div class="extra-small fw-800 text-uppercase text-muted mb-0.5" style="font-size: 0.68rem !important; letter-spacing: 0.05em;">Receta Médica</div>
                                            <div class="fw-bold text-dark text-truncate" style="font-size: 0.88rem !important;" title="${h.medicamentos.join(', ')}">${h.medicamentos.join(', ')}</div>
                                        </div>
                                    </div>
                                </div>`;
                                
                                buttonsHtml += `
                                <button onclick="openCenteredPopup('/consulta/receta/preview?idConsulta=${h.idAtencion}', 'Receta', 950, 850)" 
                                        class="btn btn-sm rounded-pill fw-800 px-4 py-2.5 d-flex align-items-center gap-2 shadow-sm border-0 text-white transition-all" 
                                        style="background-color: var(--primary) !important; font-size: 0.82rem !important; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;">
                                    <i class="bi bi-printer-fill"></i> IMPRIMIR RECETA
                                </button>`;
                            }
                            if (h.proximoControl && h.proximoControl !== '---') {
                                processHtml += `
                                <div class="col-md-6">
                                    <div class="d-flex align-items-center gap-3 p-3 rounded-4 border shadow-xs doc-block-cita">
                                        <div class="d-flex align-items-center justify-content-center rounded-3 text-info" style="width: 38px; height: 38px; flex-shrink: 0; background: #ecfeff;">
                                            <i class="bi bi-calendar-check" style="font-size: 1.25rem;"></i>
                                        </div>
                                        <div class="overflow-hidden">
                                            <div class="extra-small fw-800 text-uppercase text-muted mb-0.5" style="font-size: 0.68rem !important; letter-spacing: 0.05em;">Cita de Control</div>
                                            <div class="fw-bold text-dark text-truncate" style="font-size: 0.88rem !important;">Próximo Control: ${h.proximoControl}</div>
                                        </div>
                                    </div>
                                </div>`;
                                
                                buttonsHtml += `
                                <button onclick="verProximaCita(this)" 
                                        data-fecha="${h.proximoControl}" 
                                        data-servicio="${h.servicio || ''}" 
                                        data-medico="${h.medico || ''}"
                                        class="btn btn-sm rounded-pill fw-800 px-4 py-2.5 d-flex align-items-center gap-2 shadow-sm border-0 text-white transition-all" 
                                        style="background-color: #06b6d4 !important; font-size: 0.82rem !important; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;">
                                    <i class="bi bi-calendar-check-fill"></i> VER CITA CONTROL
                                </button>`;
                            }
                            if (h.tieneCertificado) {
                                processHtml += `
                                <div class="col-md-6">
                                    <div class="d-flex align-items-center gap-3 p-3 rounded-4 border shadow-xs doc-block-certificado">
                                        <div class="d-flex align-items-center justify-content-center rounded-3 text-warning" style="width: 38px; height: 38px; flex-shrink: 0; background: #fffbeb;">
                                            <i class="bi bi-award" style="font-size: 1.25rem;"></i>
                                        </div>
                                        <div class="overflow-hidden">
                                            <div class="extra-small fw-800 text-uppercase text-muted mb-0.5" style="font-size: 0.68rem !important; letter-spacing: 0.05em;">Certificado Médico</div>
                                            <div class="fw-bold text-dark text-truncate" style="font-size: 0.88rem !important;">Certificado Médico Emitido</div>
                                        </div>
                                    </div>
                                </div>`;
                                
                                buttonsHtml += `
                                <button onclick="openCenteredPopup('/consulta/certificado/preview?idConsulta=${h.idAtencion}', 'Certificado', 950, 850)" 
                                        class="btn btn-sm rounded-pill fw-800 px-4 py-2.5 d-flex align-items-center gap-2 shadow-sm border-0 text-white transition-all" 
                                        style="background-color: #f59e0b !important; font-size: 0.82rem !important; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;">
                                    <i class="bi bi-file-earmark-medical-fill"></i> VER CERTIFICADO
                                </button>`;
                            }
                            if (h.estadoSalida === 'REFERENCIA') {
                                processHtml += `
                                <div class="col-md-6">
                                    <div class="d-flex align-items-center gap-3 p-3 rounded-4 border shadow-xs doc-block-referencia">
                                        <div class="d-flex align-items-center justify-content-center rounded-3 text-danger" style="width: 38px; height: 38px; flex-shrink: 0; background: #fef2f2;">
                                            <i class="bi bi-file-earmark-arrow-up" style="font-size: 1.25rem;"></i>
                                        </div>
                                        <div class="overflow-hidden">
                                            <div class="extra-small fw-800 text-uppercase text-muted mb-0.5" style="font-size: 0.68rem !important; letter-spacing: 0.05em;">Referencia de Paciente</div>
                                            <div class="fw-bold text-dark text-truncate" style="font-size: 0.88rem !important;">Paciente Referido a Otro Centro</div>
                                        </div>
                                    </div>
                                </div>`;
                                
                                buttonsHtml += `
                                <button onclick="openCenteredPopup('/consulta/referencia/preview?idConsulta=${h.idAtencion}', 'Referencia', 950, 850)" 
                                        class="btn btn-sm rounded-pill fw-800 px-4 py-2.5 d-flex align-items-center gap-2 shadow-sm border-0 text-white transition-all" 
                                        style="background-color: #ef4444 !important; font-size: 0.82rem !important; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;">
                                    <i class="bi bi-file-earmark-arrow-up-fill"></i> VER REFERENCIA
                                </button>`;
                            }
                            if (processHtml !== '') {
                                processHtml = `
                                <div class="mt-4 pt-4.5" style="border-top: 1px solid var(--border) !important;">
                                    <div class="fw-800 mb-3 text-muted d-flex align-items-center gap-2" style="font-size: 0.78rem !important; letter-spacing: 0.05em; text-transform: uppercase;">
                                        <i class="bi bi-folder2-open" style="font-size: 0.95rem;"></i> Documentación y Servicios Generados:
                                    </div>
                                    <div class="row g-3 mb-3.5">${processHtml}</div>
                                    <div class="d-flex flex-wrap gap-2.5 mt-3">${buttonsHtml}</div>
                                </div>`;
                            }
                            
                            html += `
                            <div class="mb-4 position-relative ps-4" style="border-left: 2px dashed rgba(13, 148, 136, 0.3); margin-left: 16px;">
                                <!-- Node con Resplandor (Neon Glow) -->
                                <div class="position-absolute rounded-circle d-flex align-items-center justify-content-center text-white" 
                                     style="width: 32px; height: 32px; left: -17px; top: 16px; background: linear-gradient(135deg, var(--premium-teal) 0%, var(--premium-teal-hover) 100%); box-shadow: 0 0 12px rgba(13, 148, 136, 0.4); border: 3px solid white; z-index: 2; transition: all 0.3s ease;">
                                    <i class="bi bi-clipboard-pulse text-white" style="font-size: 0.95rem;"></i>
                                </div>
                                
                                <div class="card timeline-card-premium border-0 shadow-sm rounded-4 overflow-hidden card-hover transition-all" style="backdrop-filter: blur(12px);">
                                    <div class="card-header border-0 py-3 px-4 cursor-pointer collapsed bg-transparent" data-bs-toggle="collapse" data-bs-target="#col_${h.idAtencion}">
                                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                                            <div>
                                                <div class="d-flex align-items-center gap-2 mb-1">
                                                    <div class="bg-primary bg-opacity-10 text-primary p-1 rounded-circle d-flex align-items-center justify-content-center" style="width: 22px; height: 22px;">
                                                        <i class="bi bi-calendar-event" style="font-size: 0.65rem;"></i>
                                                    </div>
                                                    <span class="small fw-bold text-primary">${datePart}</span>
                                                    <span class="badge bg-success bg-opacity-10 text-success rounded-pill extra-small fw-900 tracking-wider ms-2 shadow-xs border border-success border-opacity-25 py-1 px-2">COMPLETADO</span>
                                                </div>
                                                <h6 class="fw-900 text-dark mb-0 mt-2" style="font-size: 1.05rem; letter-spacing: -0.01em;">${title}</h6>
                                            </div>
                                            <div class="d-flex align-items-center gap-3">
                                                <span class="badge px-4 py-2 rounded-pill shadow-xs border" style="font-size: 0.9rem; font-weight: 800; background: linear-gradient(to right, #f8fafc, #f1f5f9); color: var(--primary); border-color: rgba(13, 148, 136, 0.2) !important;">S/ ${price}</span>
                                                <div class="bg-light rounded-circle d-flex align-items-center justify-content-center transition-all icon-collapse-wrapper" style="width: 32px; height: 32px; border: 1px solid rgba(0,0,0,0.05);">
                                                    <i class="bi bi-chevron-down text-primary" style="font-size: 1rem;"></i>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div id="col_${h.idAtencion}" class="collapse" data-bs-parent="#timelineAccordion">
                                        <div class="card-body bg-white border-0 px-4 pb-4 pt-0">
                                            <div class="d-flex align-items-center justify-content-between pt-3 pb-2 mb-3 mt-1" style="border-top: 1px dashed var(--border) !important;">
                                                <span class="small fw-bold text-muted d-flex align-items-center gap-1.5">
                                                    <i class="bi bi-person-badge text-primary" style="font-size: 1rem;"></i>
                                                    Médico Tratante: <strong class="text-dark">${h.medico}</strong>
                                                </span>
                                            </div>
                                            
                                            <!-- Signos Vitales -->
                                            <div class="d-flex flex-wrap gap-2 mb-3">
                                                <div class="d-flex align-items-center gap-2 px-3 py-1.5 rounded-4 border bg-light-subtle shadow-xs" style="font-size: 0.8rem; border-color: var(--border) !important;">
                                                    <i class="bi bi-heart-pulse text-danger animate-pulse" style="font-size: 0.95rem;"></i>
                                                    <span class="text-muted fw-bold">P.A:</span>
                                                    <strong class="text-dark fw-800">${h.pa || '--/--'}</strong>
                                                </div>
                                                <div class="d-flex align-items-center gap-2 px-3 py-1.5 rounded-4 border bg-light-subtle shadow-xs" style="font-size: 0.8rem; border-color: var(--border) !important;">
                                                    <i class="bi bi-thermometer-half text-warning" style="font-size: 0.95rem;"></i>
                                                    <span class="text-muted fw-bold">T°:</span>
                                                    <strong class="text-dark fw-800">${h.temp || '--'} °C</strong>
                                                </div>
                                                <div class="d-flex align-items-center gap-2 px-3 py-1.5 rounded-4 border bg-light-subtle shadow-xs" style="font-size: 0.8rem; border-color: var(--border) !important;">
                                                    <i class="bi bi-activity text-info" style="font-size: 0.95rem;"></i>
                                                    <span class="text-muted fw-bold">F.C:</span>
                                                    <strong class="text-dark fw-800">${h.fc || '--'} lpm</strong>
                                                </div>

                                                    <span class="text-muted fw-bold">SatO₂:</span>
                                                    <strong class="text-dark fw-800">${h.sat || '--'}%</strong>
                                                </div>
                                            </div>
 
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <div class="p-3 rounded-4 border shadow-xs h-100 timeline-block-motivo">
                                                        <div class="d-flex align-items-center gap-2 mb-2">

                                                        </div>
                                                        <div class="fw-semibold text-dark" style="font-size: 0.88rem; line-height: 1.5; min-height: 40px; white-space: pre-line;">
                                                            ${h.anamnesis && h.anamnesis !== '---' ? h.anamnesis : (h.motivo || '---')}
                                                        </div>

                                                            <span class="extra-small fw-800 text-uppercase" style="letter-spacing: 0.05em; font-size: 0.75rem !important; color: #475569;">Diagnóstico (CIE-10)</span>
                                                        </div>
                                                        <div class="fw-semibold text-dark" style="font-size: 0.88rem; line-height: 1.5; min-height: 40px;">
                                                            ${dxHtml}
                                                        </div>
                                                    </div>

                                                            ${h.plan || '---'}

                                                    </div>
                                                </div>
                                            </div>
                                            ${processHtml}
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                        });
                        html += '</div>';
                        timelineList.innerHTML = html;
                    } catch (e) {
                        timelineList.innerHTML = '<div class="alert alert-danger rounded-4 fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>Error al cargar el historial clínico.</div>';
                    }
                }

                function openCenteredPopup(url, title, w, h) {
                    const dualScreenLeft = window.screenLeft !== undefined ? window.screenLeft : window.screenX;
                    const dualScreenTop = window.screenTop !== undefined ? window.screenTop : window.screenY;

                    const width = window.innerWidth ? window.innerWidth : document.documentElement.clientWidth ? document.documentElement.clientWidth : screen.width;
                    const height = window.innerHeight ? window.innerHeight : document.documentElement.clientHeight ? document.documentElement.clientHeight : screen.height;

                    const systemZoom = width / window.screen.availWidth;
                    const left = (width - w) / 2 / systemZoom + dualScreenLeft;
                    const top = (height - h) / 2 / systemZoom + dualScreenTop;
                    
                    const newWindow = window.open(url, title, `scrollbars=yes,width=${w / systemZoom},height=${h / systemZoom},top=${top},left=${left}`);

                    if (window.focus && newWindow) newWindow.focus();
                }

                function verProximaCita(btn) {
                    const fecha = btn.getAttribute('data-fecha');
                    const servicio = btn.getAttribute('data-servicio');
                    const medico = btn.getAttribute('data-medico');
                    const patientName = document.getElementById('detName') ? document.getElementById('detName').innerText : 'Paciente';
                    
                    let formattedFecha = fecha;
                    if (fecha && fecha.includes('-')) {
                        const parts = fecha.split('-');
                        if (parts.length === 3) {
                            formattedFecha = `${parts[2]}/${parts[1]}/${parts[0]}`;
                        }
                    }

                    Swal.fire({
                        title: '<div class="bg-info bg-opacity-10 p-3 rounded-circle d-inline-block mb-3" style="background-color: rgba(6, 182, 212, 0.1) !important;"><i class="bi bi-calendar-check text-info fs-1"></i></div>',
                        html: `

                            <div class="text-start p-3 rounded-4 bg-light border border-light-subtle shadow-xs mb-1" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; line-height: 1.65;">
                                <div class="mb-2">
                                    <span class="text-muted small d-block">Paciente:</span>
                                    <strong class="text-dark d-block">${patientName}</strong>
                                </div>
                                <div class="mb-2">
                                    <span class="text-muted small d-block">Especialidad:</span>
                                    <strong class="text-dark d-block">${servicio ? servicio.toUpperCase() : 'MEDICINA GENERAL'}</strong>
                                </div>
                                <div class="mb-2">
                                    <span class="text-muted small d-block">Médico Tratante:</span>
                                    <strong class="text-dark d-block">${medico || 'Por asignar'}</strong>
                                </div>
                                <div>
                                    <span class="text-muted small d-block">Fecha Programada:</span>
                                    <strong class="text-info d-block fw-900" style="font-size: 1.05rem;"><i class="bi bi-calendar-event me-1"></i>${formattedFecha}</strong>
                                </div>
                            </div>
                        `,
                        confirmButtonText: 'ENTENDIDO',
                        confirmButtonColor: '#06b6d4',
                        customClass: {
                            popup: 'rounded-5 border-0 shadow-premium p-4',
                            confirmButton: 'fw-800 rounded-pill px-5 py-2.5 shadow-glow'
                        }
                    });
                }
