<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Monitor de Triaje')}"></head>
<body class="bg-deep">
    <div th:replace="~{layout :: sidebar}"></div>
    
    <main th:replace="~{layout :: main(pageTitle='Gestión de Triaje', content=~{::#triaje-content}, modals=null)}">
        <div id="triaje-content" class="animate-fade-in single-screen-container">
            
            <!-- PREMIUM HEADER -->
            <div class="card glass-panel-premium border-0 p-4 mb-4 shadow-sm">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-primary p-3 rounded-4 shadow-glow">
                            <i class="bi bi-heart-pulse-fill fs-3 text-white"></i>
                        </div>
                        <div>
                            <h4 class="fw-800 text-dark mb-1">Monitor de Espera: Triaje</h4>
                            <p class="text-muted extra-small mb-0 fw-bold">Gestión de flujo de pacientes para toma de funciones vitales.</p>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center gap-3">
                        <div class="search-container shadow-sm border-0 bg-white" style="width: 300px;">
                            <i class="bi bi-search text-primary"></i>
                            <form th:action="@{/triaje/nuevo}" method="get" class="w-100">
                                <input type="text" name="hc" placeholder="DNI o Historia Clínica..." class="border-0 bg-transparent w-100 outline-none small">
                            </form>
                        </div>
                        <div class="vr mx-2 opacity-10"></div>
                        <span class="badge bg-primary rounded-pill px-4 py-2 fw-800" th:if="${pacientesPendientes != null}" th:text="${pacientesPendientes.size() + ' PENDIENTES'}">0 PENDIENTES</span>
                        <button class="btn btn-outline-primary btn-sm rounded-circle p-2 shadow-sm" onclick="window.location.reload()">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- GLASS-MEDICAL-PREMIUM CARDS GRID -->
            <div class="row g-4 overflow-y-auto pe-2 custom-scrollbar flex-grow-1 align-content-start">
                <div class="col-xl-4 col-lg-6 col-md-12" th:each="p : ${pacientesPendientes}">
                    <div class="card-triaje-patient" 
                         th:onclick="'window.location.href=\'/triaje/registrar/' + ${p.idPersona} + '\''">
                        
                        <div class="card-medical-glass p-0 rounded-5 shadow-sm bg-white border border-light overflow-hidden transition-all">
                            <!-- Header: Identity -->
                            <div class="p-4 d-flex align-items-center gap-3">
                                <div class="avatar-premium bg-indigo shadow-sm text-white fw-bold">
                                    <span th:text="${p.nombres.substring(0,1)}">M</span>
                                </div>
                                <div class="flex-grow-1">
                                    <h4 class="fw-950 text-dark mb-1 tracking-tighter" style="font-size: 1.2rem;" 
                                        th:text="${(p.nombres + ' ' + (p.apellidoPaterno ?: '')).toUpperCase()}">MARIA TINCO</h4>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge-hc px-3 py-1 fw-900" th:text="'HC: ' + ${p.numeroHistoriaClinica}">HC: 2026-000001</span>
                                        <div class="dot-active animate-pulse" style="background: var(--p-rose); box-shadow: 0 0 10px var(--p-rose);"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Data Grid: Symmetrical & Professional -->
                            <div class="px-4 pb-4">
                                <div class="row g-3">
                                    <div class="col-6">
                                        <div class="glass-info-card info-amber h-100">
                                            <label>SERVICIO</label>
                                            <div class="data-value text-truncate" th:text="${p.servicioSolicitado ?: 'Medicina General'}">Medicina General</div>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="glass-info-card info-rose h-100">
                                            <label>ESTADO</label>
                                            <div class="data-value">SIN TRIAJE</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Action Footer -->
                            <div class="px-4 py-3 bg-light bg-opacity-50 border-top d-flex justify-content-between align-items-center">
                                <div class="status-pill status-waiting">
                                    <i class="bi bi-heart-pulse-fill"></i> PENDIENTE
                                </div>
                                <button type="button" class="btn-premium btn-indigo">
                                    TRIAJE <i class="bi bi-chevron-right ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- EMPTY STATE -->
                <div class="col-12 text-center py-5" th:if="${pacientesPendientes == null || pacientesPendientes.isEmpty()}">
                    <div class="py-5 opacity-50">
                        <i class="bi bi-check2-all display-1 text-primary mb-3"></i>
                        <h4 class="fw-800 text-muted">Triaje al día</h4>
                        <p class="text-muted small">No hay pacientes esperando triaje en este momento.</p>
                    </div>
                </div>
            </div>
        </div>

        <style>
            .avatar-caja { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.2rem; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
            .service-tag-premium { background: rgba(79, 70, 229, 0.05); color: #4f46e5; padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; display: inline-flex; align-items: center; width: fit-content; }
            .card-hover-effect { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.03) !important; }
            .card-hover-effect:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08) !important; border-color: rgba(79, 70, 229, 0.2) !important; }
            .extra-small { font-size: 0.65rem; }
        </style>
    </main>

    <style>
        :root { --p-indigo: #4f46e5; --p-emerald: #10b981; --p-amber: #f59e0b; --p-rose: #ef4444; }
        .card-medical-glass { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.08) !important; background: #fff; }
        .card-medical-glass:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(79, 70, 229, 0.12) !important; border-color: var(--p-indigo) !important; }
        .avatar-premium { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: linear-gradient(135deg, var(--p-indigo), #6366f1); color: white; }
        .badge-hc { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.75rem; letter-spacing: 0.5px; }
        .dot-active { width: 10px; height: 10px; background: var(--p-emerald); border-radius: 50%; box-shadow: 0 0 12px var(--p-emerald); }
        .glass-info-card { padding: 14px; border-radius: 18px; border: 1px solid rgba(0,0,0,0.04); transition: all 0.3s ease; }
        .glass-info-card label { display: block; font-size: 0.65rem; font-weight: 900; letter-spacing: 1.2px; margin-bottom: 6px; text-transform: uppercase; opacity: 0.8; }
        .glass-info-card .data-value { font-size: 1.15rem; font-weight: 950; color: #0f172a; }
        .info-indigo { background: rgba(79, 70, 229, 0.08); border-left: 5px solid var(--p-indigo); }
        .info-emerald { background: rgba(16, 185, 129, 0.08); border-left: 5px solid var(--p-emerald); }
        .info-amber { background: rgba(245, 158, 11, 0.08); border-left: 5px solid var(--p-amber); }
        .info-rose { background: rgba(239, 68, 68, 0.08); border-left: 5px solid var(--p-rose); }
        .status-pill { padding: 8px 16px; border-radius: 100px; font-size: 0.75rem; font-weight: 900; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        .btn-premium { border: none; padding: 12px 28px; border-radius: 100px; font-weight: 950; font-size: 0.9rem; transition: all 0.3s ease; display: flex; align-items: center; letter-spacing: 0.5px; background: var(--p-indigo); color: white; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.25); }
        .btn-premium:hover { background: #4338ca; transform: scale(1.05); box-shadow: 0 15px 30px rgba(79, 70, 229, 0.35); }
        .fw-950 { font-weight: 950; }
        .tracking-tighter { letter-spacing: -1px; }
    </style>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
