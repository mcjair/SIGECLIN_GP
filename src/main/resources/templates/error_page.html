<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del Sistema | SIGECLIN</title>
    <!-- Mismos CSS Base para "Impeccable UI" -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    
    <style>
        body {
            background-color: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-main);
        }
        .error-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-premium);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .error-icon {
            font-size: 5rem;
            color: var(--danger);
            margin-bottom: 1rem;
            background: var(--danger-soft);
            width: 120px;
            height: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .error-code {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-message {
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <div class="error-code" th:text="${errorStatus != null ? errorStatus : '500'}">500</div>
        <h3 class="fw-800 text-dark mb-3">¡Oops! Algo salió mal</h3>
        <p class="error-message" th:text="${errorMsg != null ? errorMsg : 'No se pudo procesar la solicitud debido a un error interno.'}">
            Ha ocurrido un problema inesperado en los servidores.
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary rounded-pill px-4 py-2 fw-bold shadow-sm transition-all hover-scale">
            <i class="bi bi-house-door-fill me-2"></i> Volver al Inicio
        </a>
    </div>
</body>
</html>
