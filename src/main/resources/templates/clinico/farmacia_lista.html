<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Farmacia')}"></head>
<body class="bg-premium">
    <div th:replace="~{layout :: sidebar}"></div>
    
    <main th:replace="~{layout :: main(pageTitle='Dispensación de Medicamentos', content=~{::#far-content}, modals=null)}">
        <div id="far-content" class="p-4">
            <div class="card glass-panel-premium border-0 p-4 mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-800 text-dark mb-1">Recetas Pendientes</h4>
                        <p class="text-muted small mb-0">Control de stock y entrega de medicamentos por paciente.</p>
                    </div>
                </div>
            </div>

            <div class="card glass-panel-premium border-0 shadow-sm overflow-hidden p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4 py-3 fw-800 text-muted small text-uppercase">N° Receta / CIE-10</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Paciente (SIS/DNI)</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Ítems Prescritos (DCI)</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Emisión</th>
                                <th class="pe-4 py-3 text-center fw-800 text-muted small text-uppercase">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${recetas}" class="hover-scale transition-all">
                                <td class="ps-4">
                                    <div class="fw-800 text-primary" th:text="${'REC-' + #numbers.formatInteger(r.get('nro_receta'), 6)}">REC-000001</div>
                                    <div class="extra-small text-muted fw-bold" th:text="${r.get('cie10') ?: 'CIE-10: PENDIENTE'}">CIE-10: PENDIENTE</div>
                                </td>
                                <td>
                                    <div class="fw-800 text-dark text-uppercase" th:text="${r.get('paciente')}">JUAN PÉREZ</div>
                                    <div class="extra-small text-muted fw-bold" th:text="${r.get('pacienteDni') ?: '45678901'}">45678901</div>
                                </td>
                                <td>
                                    <div class="fw-800 text-dark" th:text="${r.get('items') ?: 'PARACETAMOL 500mg...'}">PARACETAMOL 500mg...</div>
                                    <span class="badge bg-info bg-opacity-10 text-info extra-small fw-800 px-2" th:text="${r.get('estado')}">PENDIENTE</span>
                                </td>
                                <td th:text="${r.get('fecha') != null ? #temporals.format(r.get('fecha'), 'dd/MM/yyyy HH:mm') : '--/--/---- --:--'}">14/05/2026 10:00</td>
                                <td class="pe-4 text-center">
                                    <button class="btn btn-sm btn-primary rounded-pill px-3 fw-900 shadow-sm border-0">
                                        <i class="bi bi-capsule-pill me-1"></i> DISPENSAR
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recetas)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-capsule fs-1 d-block mb-2"></i>
                                    No hay recetas pendientes para dispensar.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
