<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comprobante de Pago - SIGECLIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 80mm;
            margin: 0 auto;
            padding: 10px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: white;
            color: #000;
            margin: 0;
            padding: 5mm;
            width: 80mm;
        }
        
        .voucher-container {
            width: 70mm;
            margin: 0 auto;
            text-align: center;
        }
        
        .voucher-header {
            border-bottom: 1px dashed #000;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        
        .logo-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.75rem;
            text-align: left;
        }
        
        .info-label {
            font-weight: 600;
            color: #333;
            flex-shrink: 0;
        }
        
        .info-value {
            font-weight: 700;
            text-align: right;
            word-break: break-word;
            margin-left: 10px;
        }

        .service-banner {
            background: #f8fafc;
            border: 1px solid #000;
            padding: 8px;
            margin: 15px 0;
            border-radius: 8px;
        }

        .service-label {
            font-size: 0.65rem;
            font-weight: 800;
            display: block;
            margin-bottom: 2px;
        }

        .service-name {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .total-section {
            border-top: 1px dashed #000;
            margin-top: 10px;
            padding-top: 10px;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-label {
            font-weight: 800;
            font-size: 1.1rem;
        }
        
        .total-amount {
            font-weight: 800;
            font-size: 1.4rem;
        }
        
        @media print {
            body { width: 80mm; }
            .no-print { display: none; }
        }
    </style>
</head>
<body onload="window.print(); window.onafterprint = function() { window.close(); };">
    <div class="voucher-container">
        <div class="voucher-header">
            <h5 class="fw-800 mb-0">Comprobante de Pago</h5>
            <p class="small mb-0">SIGECLIN VOUCHER</p>
        </div>
        
        <div class="voucher-body">
            <!-- SERVICIO DE DESTINO - MÁS VISIBLE -->
            <div class="service-banner">
                <span class="service-label">DERIVADO A:</span>
                <div class="service-name" th:text="${servicio ?: 'TRIAJE / MEDICINA'}">MEDICINA GENERAL</div>
            </div>

            <div class="info-row">
                <span class="info-label">PACIENTE:</span>
                <span class="info-value" th:text="${paciente != null ? paciente.nombres + ' ' + paciente.apellidoPaterno : '---'}">JUAN PEREZ</span>
            </div>
            <div class="info-row">
                <span class="info-label">H.C.:</span>
                <span class="info-value" th:text="${paciente != null ? paciente.numeroHistoriaClinica : '---'}">2026-000001</span>
            </div>
            <div class="info-row">
                <span class="info-label">FECHA:</span>
                <span class="info-value" th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}">15/05/2026</span>
            </div>
            
            <div class="total-section">
                <div class="info-row">
                    <span class="info-label">CONCEPTO:</span>
                    <span class="info-value">ATENCION INTEGRAL</span>
                </div>
                <div class="total-row mt-2">
                    <span class="total-label">TOTAL:</span>
                    <span class="total-amount">S/ 50.00</span>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 pt-2 border-top border-dark">
            <p style="font-size: 0.6rem; font-weight: 700; margin-bottom: 0;">Centro de Salud CLAS - Grocio Prado</p>
            <p style="font-size: 0.5rem;">SIGECLIN - Gestión Hospitalaria Premium</p>
        </div>
    </div>
</body>
</html>
