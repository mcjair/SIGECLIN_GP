version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sigeclin-postgres
    environment:
      POSTGRES_DB: sigeclin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sigeclin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sigeclin-app
    ports:
      - "3001:3001"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/sigeclin?sslmode=prefer
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - APP_CRYPTO_KEY=SigeclinSecureKeyDefault32BytesLong
      - SESSION_TIMEOUT=15m
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
