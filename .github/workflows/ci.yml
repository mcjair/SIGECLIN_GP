name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sigeclin
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        env:
          DB_URL: jdbc:postgresql://localhost:5432/sigeclin?sslmode=disable
          DB_USERNAME: admin
          DB_PASSWORD: admin
          APP_CRYPTO_KEY: SigeclinSecureKeyDefault32BytesLong
        run: mvn -B clean verify

      - name: Run OWASP Dependency Check
        env:
          DB_URL: jdbc:postgresql://localhost:5432/sigeclin?sslmode=disable
          DB_USERNAME: admin
          DB_PASSWORD: admin
          APP_CRYPTO_KEY: SigeclinSecureKeyDefault32BytesLong
        run: mvn -B -P security-audit dependency-check:check
