<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio Obligatorio de Contraseña | SIGECLIN</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --accent-blue: #0ea5e9;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        .btn-custom {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
            color: white;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">Seguridad de la Cuenta</h3>
        <p class="text-muted">Por normativas de seguridad clínica, debes establecer tu propia contraseña antes de acceder al sistema.</p>
    </div>
    
    <form id="formCambiarClave">
        <!-- El input csrf se generará si CSRF está activo -->
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" id="csrfToken"/>
        
        <div class="mb-4">
            <label class="form-label fw-medium text-dark">Nueva Contraseña</label>
            <input type="password" class="form-control form-control-lg" id="newPassword" name="newPassword" placeholder="Mínimo 5 caracteres" required>
        </div>
        <button type="submit" class="btn btn-custom" id="btnGuardar">Guardar y Continuar al Dashboard</button>
    </form>
</div>

<script>
    document.getElementById('formCambiarClave').addEventListener('submit', async function(e) {
        e.preventDefault();
        const pwd = document.getElementById('newPassword').value;
        const csrfInput = document.getElementById('csrfToken');
        
        if (pwd.length < 5) {
            Swal.fire('Atención', 'La contraseña debe tener al menos 5 caracteres', 'warning');
            return;
        }

        const formData = new URLSearchParams();
        formData.append('newPassword', pwd);
        if (csrfInput) {
            formData.append(csrfInput.name, csrfInput.value);
        }

        try {
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            const response = await fetch('/cambiar-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            });

            const data = await response.json();

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: '¡Excelente!',
                    text: data.message,
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    // Refrescar al dashboard, la sesión ya está autorizada
                    window.location.href = '/dashboard';
                });
            } else {
                Swal.fire('Error', data.message || 'Error al actualizar la contraseña', 'error');
                btn.disabled = false;
                btn.innerText = "Guardar y Continuar al Dashboard";
            }
        } catch (err) {
            Swal.fire('Error de red', 'No se pudo conectar con el servidor', 'error');
        }
    });
</script>

</body>
</html>
