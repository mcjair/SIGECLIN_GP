<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Laboratorio')}"></head>
<body class="bg-deep">
    <div th:replace="~{layout :: sidebar}"></div>
    
    <main th:replace="~{layout :: main(pageTitle='Gestión de Laboratorio', content=~{::#lab-content}, modals=null)}">
        <div id="lab-content" class="p-4">
            <div class="card glass-panel-premium border-0 p-4 mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-800 text-dark mb-1">Órdenes de Examen</h4>
                        <p class="text-muted small mb-0">Gestión de análisis clínicos y resultados MINSA.</p>
                    </div>
                    <button class="btn btn-primary rounded-pill px-4 fw-bold">
                        <i class="bi bi-plus-lg me-2"></i> NUEVA ORDEN
                    </button>
                </div>
            </div>

            <div class="card glass-panel-premium border-0 shadow-sm overflow-hidden p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4 py-3 fw-800 text-muted small text-uppercase">N° Orden / CPT</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Paciente (DNI/HC)</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Análisis / Muestra</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Resultado (Campo LAB)</th>
                                <th class="py-3 fw-800 text-muted small text-uppercase">Estado</th>
                                <th class="pe-4 py-3 text-center fw-800 text-muted small text-uppercase">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="o, iter : ${ordenes}" class="hover-scale transition-all">
                                <td class="ps-4">
                                    <div class="fw-800 text-primary" th:text="${'ORD-' + #numbers.formatInteger(iter.count, 5)}">ORD-00001</div>
                                    <div class="extra-small text-muted fw-bold" th:text="${o.get('codigoCpt') ?: 'CPT-85025'}">CPT-85025</div>
                                </td>
                                <td>
                                    <div class="fw-800 text-dark text-uppercase" th:text="${o.get('paciente')}">JUAN PÉREZ</div>
                                    <div class="extra-small text-muted fw-bold" th:text="${o.get('pacienteDni') ?: '45678901'}">45678901</div>
                                </td>
                                <td>
                                    <div class="fw-800 text-dark" th:text="${o.get('examen')}">HEMOGRAMA COMPLETO</div>
                                    <div class="badge bg-light text-muted border extra-small fw-bold" th:text="${o.get('muestra') ?: 'SANGRE TOTAL'}">SANGRE TOTAL</div>
                                </td>
                                <td>
                                    <div class="fw-900 text-primary fs-5" th:text="${o.get('resultado') ?: '---'}">12.5</div>
                                    <div class="extra-small text-muted fw-bold" th:text="${o.get('unidades') ?: 'g/dL'}">g/dL</div>
                                </td>
                                <td>
                                    <span class="badge bg-warning bg-opacity-10 text-warning px-3 rounded-pill fw-800" 
                                          th:classappend="${o.get('estado') == 'VALIDADO' ? 'bg-success text-success' : ''}"
                                          th:text="${o.get('estado')}">PENDIENTE</span>
                                </td>
                                <td class="pe-4 text-center">
                                    <button class="btn btn-sm btn-primary rounded-pill px-3 fw-900 shadow-sm border-0" 
                                            th:onclick="'abrirModalResultados(' + ${iter.index} + ')'">
                                        <i class="bi bi-file-earmark-medical me-1"></i> RESULTADOS
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(ordenes)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No hay órdenes de laboratorio pendientes.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
