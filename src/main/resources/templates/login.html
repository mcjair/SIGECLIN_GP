<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGECLIN - Acceso al Sistema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
        }
        
        .login-header {
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.3);
        }
        
        .form-floating > .form-control {
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            padding: 1.5rem 1rem;
            height: 65px;
        }
        
        .form-floating > .form-control:focus {
            box-shadow: 0 0 0 4px var(--primary-glow);
            border-color: var(--primary);
        }
        
        .btn-login {
            background: var(--primary-gradient);
            border: none;
            padding: 1.2rem;
            border-radius: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 1rem;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        .decoration-blob {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
        }

        /* SVG Heartbeat Loader CSS */
        .loading svg polyline {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .loading svg polyline#back {
            fill: none;
            stroke: rgba(79, 70, 229, 0.2);
        }

        .loading svg polyline#front {
            fill: none;
            stroke: var(--primary);
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash_682 2s linear infinite;
            animation-delay: 0s;
        }

        .loading svg polyline#front2 {
            fill: none;
            stroke: var(--primary);
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash_682 2s linear infinite;
            animation-delay: 1s;
        }

        @keyframes dash_682 {
            72.5% {
                opacity: 0;
            }
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>
    <div class="decoration-blob bg-primary" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="decoration-blob bg-info" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <div class="login-card animate-fade-in">
        <div class="login-header">
            <div class="logo-circle">
                <i class="bi bi-shield-plus text-white fs-1"></i>
            </div>
            <h2 class="fw-800 text-dark mb-1">SIGECLIN</h2>
            <p class="text-muted small">Gestión Hospitalaria de Nueva Generación</p>
        </div>

        <div th:if="${param.error}" class="alert bg-danger-subtle border-0 rounded-4 p-3 mb-4 text-center">
            <i class="bi bi-exclamation-circle me-2"></i> Credenciales incorrectas
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Usuario" required autocomplete="off">
                <label for="username" class="text-muted fw-bold">Nombre de Usuario</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                <label for="password" class="text-muted fw-bold">Contraseña</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember-me">
                    <label class="form-check-label small fw-bold text-muted" for="remember">Recordarme</label>
                </div>
                <a href="#" class="small fw-800 text-primary text-decoration-none">¿Olvidó su clave?</a>
            </div>

            <button type="submit" class="btn-premium-action w-100 text-uppercase">
                <span class="transition"></span>
                <span class="gradient"></span>
                <span class="label">Ingresar al Sistema <i class="bi bi-arrow-right ms-2"></i></span>
            </button>
        </form>

        <div class="mt-5 text-center">
            <p class="extra-small text-dim fw-bold">© 2026 SIGECLIN Hospital System. v2.0 Premium</p>
        </div>
    </div>

    <!-- Loader Overlay -->
    <div id="loaderOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-none flex-column justify-content-center align-items-center" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 9999;">
        <div class="loading">
            <svg height="80px" width="100px" viewBox="0 0 64 48">
                <polyline id="back" points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" />
                <polyline id="front" points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" />
                <polyline id="front2" points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" />
            </svg>
        </div>
        <h5 class="mt-4 fw-800 text-dark">Autenticando credenciales...</h5>
        <p class="text-muted small fw-bold">Por favor espere un momento</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            const overlay = document.getElementById('loaderOverlay');
            overlay.classList.remove('d-none');
            overlay.classList.add('d-flex');
            
            setTimeout(() => {
                form.submit();
            }, 2000);
        });
    </script>
</body>
</html>
