<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title='SIGECLIN - Pacientes')}"></head>
<body class="bg-deep">
    <div th:replace="~{layout :: sidebar}"></div>
    
    <main th:replace="~{layout :: main(pageTitle='Gestión de Pacientes', content=~{::#pacientes-content}, modals=null)}">
        <div id="pacientes-content" class="h-100 d-flex gap-4 p-4" style="max-height: 100vh; margin-top: -15px;">
            
            <!-- LEFT COLUMN: Patient Search and List -->
            <div class="card glass-panel-premium border-0 shadow-sm d-flex flex-column" style="width: 350px; min-width: 350px;">
                <div class="p-4 border-bottom border-light">
                    <h6 class="fw-800 text-dark mb-3 text-uppercase small tracking-wider">Buscar Paciente</h6>
                    <div class="position-relative">
                        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                        <input type="text" id="searchInput" class="form-control rounded-pill ps-5 border-0 shadow-sm bg-light py-2" placeholder="Nombre, apellidos o DNI..." onkeyup="filterPatients(this)">
                    </div>
                </div>
                <div class="flex-grow-1 overflow-y-auto custom-scrollbar p-3" id="patientListContainer">
                    <div th:each="p : ${pacientes}" class="patient-row p-3 mb-2 rounded-4 border bg-white shadow-sm cursor-pointer transition-all"
                         style="border-color: #f1f5f9 !important;"
                         onclick="abrirHistorialFromCard(this)"
                         th:data-id="${p.idPersona}"
                         th:data-dni="${p.numeroDocumento}"
                         th:data-nombre="|${p.apellidoPaterno ?: ''} ${p.apellidoMaterno ?: ''}, ${p.nombres ?: ''}|"
                         th:data-fecha-nacimiento="${p.fechaNacimiento}"
                         th:data-telefono="${p.telefonoPrincipal}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="fw-800 text-dark mb-1" style="font-size: 0.85rem; line-height: 1.3;" th:text="|${p.apellidoPaterno ?: ''} ${p.apellidoMaterno ?: ''}, ${p.nombres ?: ''}|">Nombre</h6>
                                <div class="extra-small text-muted fw-bold">DNI: <span th:text="${p.numeroDocumento}"></span></div>
                            </div>
                            <i class="bi bi-chevron-right text-muted small"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Timeline & Details -->
            <div class="flex-grow-1 d-flex flex-column overflow-hidden" id="patientDetailContainer">
                
                <div class="w-100 h-100 d-flex flex-column align-items-center justify-content-center text-center opacity-25" id="placeholderDetail">
                    <!-- Placeholder vacio a pedido -->
                </div>
                
                <div id="activePatientView" style="display: none;" class="h-100 d-flex flex-column">
                    <!-- HEADER INFO -->
                    <div class="card glass-panel-premium border-0 shadow-sm p-4 mb-4 flex-shrink-0">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="bg-primary bg-opacity-10 text-primary fw-900 rounded-circle d-flex align-items-center justify-content-center fs-4 shadow-sm" style="width: 60px; height: 60px;" id="detInitials">P</div>
                                <div>
                                    <div class="d-flex align-items-center gap-3 mb-2">
                                        <h4 class="fw-900 text-dark mb-0" id="detName">Nombre Paciente</h4>
                                        <span class="badge bg-primary-soft text-primary rounded-pill fw-800 px-3 py-2">Particular</span>
                                    </div>
                                    <div class="d-flex flex-wrap gap-4 small text-muted fw-bold mt-1">
                                        <div class="d-flex align-items-center gap-2"><i class="bi bi-card-text text-primary opacity-75"></i> DNI: <span id="detDni" class="text-dark">---</span></div>
                                        <div class="d-flex align-items-center gap-2"><i class="bi bi-calendar-event text-primary opacity-75"></i> Edad: <span id="detEdad" class="text-dark">---</span></div>
                                        <div class="d-flex align-items-center gap-2"><i class="bi bi-telephone text-primary opacity-75"></i> Celular: <span id="detCelular" class="text-dark">---</span></div>
                                    </div>
                                </div>
                            </div>
                            <!-- Alergias -->
                            <div class="bg-danger bg-opacity-10 text-danger p-3 rounded-4 d-none" style="max-width: 320px;" id="detAlergias">
                                <div class="extra-small fw-900 text-uppercase mb-1 tracking-wider"><i class="bi bi-activity me-1"></i> Alergias / Alertas Clínicas</div>
                                <div class="small fw-bold" id="detAlergiasText"></div>
                            </div>
                        </div>
                    </div>

                    <!-- TIMELINE BOX -->
                    <div class="card glass-panel-premium border-0 shadow-sm p-4 flex-grow-1 d-flex flex-column overflow-hidden">
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-shrink-0">
                            <h5 class="fw-800 text-dark mb-0">Timeline de Evolución Clínica</h5>
                        </div>
                        <div class="timeline-container flex-grow-1 overflow-y-auto custom-scrollbar pe-2" id="timelineList">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>
            </div>

            <script>
                function filterPatients(input) {
                    const q = input.value.toLowerCase();
                    document.querySelectorAll('.patient-row').forEach(row => {
                        const name = row.getAttribute('data-nombre').toLowerCase();
                        const dni = row.querySelector('.text-muted span').innerText.toLowerCase();
                        if (name.includes(q) || dni.includes(q)) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    });
                }

                function abrirHistorialFromCard(element) {
                    const idPersona = element.getAttribute('data-id');
                    const nombre = element.getAttribute('data-nombre');
                    const dni = element.getAttribute('data-dni');
                    const fechaNacimiento = element.getAttribute('data-fecha-nacimiento');
                    const telefono = element.getAttribute('data-telefono') || 'No registrado';
                    
                    let edadStr = '---';
                    if (fechaNacimiento && fechaNacimiento !== 'null') {
                        const birthDate = new Date(fechaNacimiento);
                        const today = new Date();
                        let age = today.getFullYear() - birthDate.getFullYear();
                        const m = today.getMonth() - birthDate.getMonth();
                        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                            age--;
                        }
                        edadStr = age + ' años';
                    }
                    
                    abrirHistorial(element, idPersona, nombre, dni, edadStr, telefono);
                }

                document.addEventListener("DOMContentLoaded", () => {
                    const firstPatient = document.querySelector('.patient-row');
                    if (firstPatient) {
                        abrirHistorialFromCard(firstPatient);
                    }
                });

                async function abrirHistorial(element, idPersona, nombre, dni, edad, telefono) {
                    // Update active state in list
                    document.querySelectorAll('.patient-row').forEach(r => {
                        r.classList.remove('border-primary', 'bg-primary', 'bg-opacity-10');
                        r.style.borderColor = '#f1f5f9';
                    });
                    element.classList.add('border-primary', 'bg-primary', 'bg-opacity-10');
                    element.style.borderColor = '#4f46e5';

                    // Switch view
                    document.getElementById('placeholderDetail').style.display = 'none';
                    document.getElementById('activePatientView').style.display = 'flex';
                    document.getElementById('activePatientView').classList.remove('d-flex'); // For standardizing with toggle
                    document.getElementById('activePatientView').classList.add('d-flex');

                    // Set header info
                    document.getElementById('detName').innerText = nombre;
                    document.getElementById('detInitials').innerText = nombre ? nombre.charAt(0) : 'P';
                    document.getElementById('detDni').innerText = dni;
                    document.getElementById('detEdad').innerText = edad;
                    document.getElementById('detCelular').innerText = telefono;

                    const timelineList = document.getElementById('timelineList');
                    timelineList.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

                    try {
                        const resp = await fetch('/pacientes/api/historial/' + idPersona);
                        if (!resp.ok) throw new Error('Error de conexión');
                        const historial = await resp.json();
                        
                        if (historial.length === 0) {
                            timelineList.innerHTML = `
                                <div class="text-center py-5 opacity-50">
                                    <i class="bi bi-calendar-x display-3 d-block mb-3"></i>
                                    <h5 class="fw-800">SIN EVOLUCIONES</h5>
                                    <p class="small">El paciente no registra atenciones previas.</p>
                                </div>`;
                            return;
                        }

                        let html = '<div class="position-relative ms-3 ps-4 border-start border-2 border-primary border-opacity-25" id="timelineAccordion">';
                        historial.forEach(h => {
                            const [datePart, timePart] = h.fecha.split(' ');
                            const title = 'Atención Médica en ' + (h.servicio ? h.servicio.toUpperCase() : 'GENERAL');
                            const price = h.servicio === 'ODONTOLOGIA' ? '80.00' : h.servicio === 'MEDICINA GENERAL' ? '50.00' : '60.00';
                            
                            let dxHtml = '';
                            if (h.diagnostico) {
                                const dtoList = h.diagnostico.split(';');
                                dxHtml = dtoList.map(dx => `<div class="mb-1">${dx.trim()}</div>`).join('');
                            } else {
                                dxHtml = '<div>Evaluación inicial completa</div>';
                            }

                            let processHtml = '';
                            if (h.medicamentos && h.medicamentos.length > 0) {
                                processHtml += `
                                <div class="d-flex align-items-center gap-2 mt-2">
                                    <span class="badge bg-primary-soft text-primary rounded-pill px-2 py-1 extra-small fw-800"><i class="bi bi-capsule me-1"></i>RECETA</span>
                                    <span class="small text-muted fw-bold text-truncate" style="max-width: 350px;">${h.medicamentos.join(', ')}</span>
                                </div>`;
                            }
                            if (h.proximoControl && h.proximoControl !== '---') {
                                processHtml += `
                                <div class="d-flex align-items-center gap-2 mt-2">
                                    <span class="badge bg-info-soft text-info rounded-pill px-2 py-1 extra-small fw-800"><i class="bi bi-calendar-check me-1"></i>CITA CONTROL</span>
                                    <span class="small text-dark fw-bold">${h.proximoControl}</span>
                                </div>`;
                            }
                            if (h.tieneCertificado) {
                                processHtml += `
                                <div class="d-flex align-items-center gap-2 mt-2">
                                    <span class="badge bg-warning-soft text-warning rounded-pill px-2 py-1 extra-small fw-800"><i class="bi bi-award me-1"></i>CERTIFICADO</span>
                                    <span class="small text-muted fw-bold">Certificado Médico Emitido</span>
                                </div>`;
                            }
                            if (h.estadoSalida === 'REFERENCIA') {
                                processHtml += `
                                <div class="d-flex align-items-center gap-2 mt-2">
                                    <span class="badge bg-danger-soft text-danger rounded-pill px-2 py-1 extra-small fw-800"><i class="bi bi-file-earmark-arrow-up me-1"></i>REFERENCIA</span>
                                    <span class="small text-muted fw-bold">Paciente Referido</span>
                                </div>`;
                            }
                            if (processHtml !== '') {
                                processHtml = `
                                <div class="mt-3 pt-3 border-top border-light">
                                    <div class="small fw-bold text-dark mb-2">Procedimiento / Tratamiento Realizado:</div>
                                    ${processHtml}
                                </div>`;
                            }
                            
                            html += `
                            <div class="mb-4 position-relative">
                                <!-- Node -->
                                <div class="position-absolute bg-primary rounded-circle d-flex align-items-center justify-content-center text-white shadow-sm" style="width: 24px; height: 24px; left: -37px; top: 15px;">
                                    <i class="bi bi-activity" style="font-size: 0.7rem;"></i>
                                </div>
                                
                                <div class="card border border-light shadow-sm rounded-4 overflow-hidden">
                                    <div class="card-header bg-white border-0 p-3 pb-0 cursor-pointer" data-bs-toggle="collapse" data-bs-target="#col_${h.idAtencion}">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <div class="d-flex align-items-center gap-2 mb-1">
                                                    <i class="bi bi-calendar-event text-muted small"></i>
                                                    <span class="small fw-bold text-muted">${datePart}</span>
                                                    <span class="badge bg-success-soft text-success rounded-pill extra-small fw-900 tracking-wider">COMPLETADO</span>
                                                </div>
                                                <h6 class="fw-800 text-dark mb-0">${title}</h6>
                                            </div>
                                            <div class="d-flex align-items-center gap-3">
                                                <span class="fw-900 text-dark">S/ ${price}</span>
                                                <i class="bi bi-chevron-down text-muted"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div id="col_${h.idAtencion}" class="collapse" data-bs-parent="#timelineAccordion">
                                        <div class="card-body bg-white border-0 p-4">
                                            <div class="small fw-bold text-dark mb-2">Evolución / Descripción:</div>
                                            <div class="bg-light p-3 rounded-3 border-0 small text-muted fw-bold">
                                                ${dxHtml}
                                            </div>
                                            ${processHtml}
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                        });
                        html += '</div>';
                        timelineList.innerHTML = html;
                    } catch (e) {
                        timelineList.innerHTML = '<div class="alert alert-danger rounded-4 fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>Error al cargar el historial clínico.</div>';
                    }
                }
            </script>
            <style>
                .patient-row:hover { background: #f8fafc !important; }
                .tracking-wider { letter-spacing: 0.05rem; }
            </style>
        </div>
    </main>
    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
