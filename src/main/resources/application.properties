spring.application.name=sigeclin
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/sigeclin?sslmode=prefer}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration (REND-01: Optimizado)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SigeclinHikariPool
spring.datasource.hikari.leak-detection-threshold=60000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.thymeleaf.cache=true

logging.level.com.sigeclin=INFO
logging.level.org.springframework.security=INFO

server.port=3001
spring.jpa.open-in-view=false

# CIE-10 Catalog Configuration
sigeclin.cie10.dir-path=./ciex

# Spring Boot Actuator Configuration (Seguro)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Seguridad: Prevenir fuga de información (Information Leakage - A05:2021)
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

# Session Timeout
server.servlet.session.timeout=${SESSION_TIMEOUT:1m}

# A05: Cookies de sesion seguras (HttpOnly + SameSite=Strict)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.name=SIGECLIN_SESSION

# Cifrado: Clave externa (AES-256)
app.security.crypto-key=${APP_CRYPTO_KEY:SigeclinSecureKeyDefault32BytesLong}